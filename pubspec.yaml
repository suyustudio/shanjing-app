name: hangzhou_guide
description: 杭州旅游指南

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  # 高德地图核心依赖：显式声明基础库，确保版本一致
  amap_flutter_base: ^3.0.0  # 基础库，提供通用类型定义
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0
  permission_handler: ^11.0.0
  cached_network_image: ^3.3.0
  flutter_tts: ^4.0.2
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  # 埋点 SDK - 暂时注释，可能导致构建失败
  # umeng_analytics_plugin: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - data/json/trails-all.json
