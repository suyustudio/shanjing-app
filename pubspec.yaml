name: hangzhou_guide
description: 杭州旅游指南

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  # 高德地图SDK
  amap_flutter_base: ^3.0.0
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0
  permission_handler: ^11.0.0
  cached_network_image: ^3.3.0
  flutter_tts: ^3.8.5  # 降级到兼容 Kotlin 1.9 的版本
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - data/json/trails-all.json
    - assets/markers/marker_start_xhdpi.png
    - assets/markers/marker_end_xhdpi.png
    - assets/markers/marker_loop_xhdpi.png
