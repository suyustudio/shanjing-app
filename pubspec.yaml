name: hangzhou_guide
description: 杭州旅游指南

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  # 高德地图SDK
  amap_flutter_base: ^3.0.0
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0
  permission_handler: ^11.0.0
  cached_network_image: ^3.3.0
  flutter_tts: ^3.8.5
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  provider: ^6.1.1
  flutter_svg: ^2.0.9
  encrypt: ^5.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - data/json/trails-all.json
    # 新版 SVG 标记图标
    - assets/markers/marker_start.svg
    - assets/markers/marker_end.svg
    - assets/markers/marker_parking.svg
    # 旧版 PNG 图标（兼容保留）
    - assets/markers/marker_start_xhdpi.png
    - assets/markers/marker_end_xhdpi.png
    - assets/markers/marker_loop_xhdpi.png
