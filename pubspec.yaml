name: hangzhou_guide
description: 杭州旅游指南

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  # 高德地图：仅用于显示，定位用geolocator
  amap_flutter_base: ^3.0.0
  amap_flutter_map: ^3.0.0
  # 定位：使用geolocator替代高德定位SDK（GitHub Actions兼容）
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  cached_network_image: ^3.3.0
  flutter_tts: ^4.0.2
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # - .env  # 暂不包含，通过 CI secrets 注入
    - data/json/trails-all.json
