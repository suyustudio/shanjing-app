name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          # Remove existing android directory if any
          rm -rf android
          
          # Use flutter create to generate proper Android project
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
          
          echo "=== Flutter created Android project ==="
          ls -la android/
      
      - name: Fix Kotlin version
        run: |
          # Flutter 3.19 uses settings.gradle for plugin versions
          echo "=== Original settings.gradle ==="
          cat android/settings.gradle
          
          # Upgrade Kotlin version in settings.gradle
          sed -i "s/id 'org.jetbrains.kotlin.android' version '1.7.10'/id 'org.jetbrains.kotlin.android' version '1.9.10'/" android/settings.gradle
          
          echo "=== Fixed settings.gradle ==="
          cat android/settings.gradle
      
      - name: Fix AndroidManifest to V2
        run: |
          # Check if flutterEmbedding exists, if not add it
          if ! grep -q 'flutterEmbedding' android/app/src/main/AndroidManifest.xml; then
            # Add before closing </application> tag
            sed -i 's|</application>|<meta-data android:name="flutterEmbedding" android:value="2" />\n    </application>|' android/app/src/main/AndroidManifest.xml
          else
            # Change value to 2
            sed -i 's/android:value="1"/android:value="2"/' android/app/src/main/AndroidManifest.xml
          fi
          
          echo "Fixed AndroidManifest.xml to V2"
          grep -A1 'flutterEmbedding' android/app/src/main/AndroidManifest.xml || echo "No flutterEmbedding found"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
