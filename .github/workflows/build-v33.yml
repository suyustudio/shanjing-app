name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Check and create Android platform
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory not found, creating..."
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
          echo "Waiting for files..."
          sleep 5
        fi
        echo "=== Android directory contents ==="
        ls -la android/ || echo "Directory not found"
        
        # Ensure settings.gradle exists
        if [ ! -f "android/settings.gradle" ]; then
          echo "Creating settings.gradle..."
          cat > android/settings.gradle << 'EOF'
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}
EOF
        fi
    
    - name: Update Kotlin version
      run: |
        echo "=== Updating Kotlin version in settings.gradle ==="
        sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.0"/' android/settings.gradle
        cat android/settings.gradle | grep "org.jetbrains.kotlin.android"
    
    - name: Update minSdkVersion
      run: |
        echo "=== Updating minSdkVersion in app/build.gradle ==="
        # 更新 minSdkVersion 为 21
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        cat android/app/build.gradle | grep minSdkVersion
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate keystore
      run: |
        mkdir -p android/app
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shanjing.keystore
    
    - name: Configure key.properties
      run: |
        cat > android/key.properties << EOL
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=shanjing
        storeFile=shanjing.keystore
        EOL
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
