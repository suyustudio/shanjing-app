name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          rm -rf android
          if [ ! -f .env ]; then
            echo "AMAP_KEY=your_amap_key_here" > .env
          fi
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
      
      - name: Fix build files with Python
        run: |
          python3 << 'EOF'
          import os
          # Fix app/build.gradle
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          content = content.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 21')
          # Add ndk block
          content = content.replace('buildTypes', 'ndk { abiFilters "arm64-v8a", "armeabi-v7a", "x86_64" }\n    buildTypes')
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          
          # Fix AndroidManifest.xml
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()
          perms = '''
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
    <uses-permission android:name="android.permission.INTERNET"/>'''
          content = content.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' + perms)
          # Add AMap Key
          amap_key = os.environ.get('AMAP_KEY', 'your_amap_key_here')
          content = content.replace('<application', f'<application\n        <meta-data android:name="com.amap.api.v2.apikey" android:value="{amap_key}"/>')
          content = content.replace('</application>', '<meta-data android:name="flutterEmbedding" android:value="2"/>\n    </application>')
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)
          EOF
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
