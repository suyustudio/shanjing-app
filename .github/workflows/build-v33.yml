name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          rm -rf android
          if [ ! -f .env ]; then
            echo "AMAP_KEY=your_amap_key_here" > .env
          fi
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
      
      - name: Fix app/build.gradle
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/buildTypes/ndk { abiFilters "arm64-v8a", "armeabi-v7a", "x86_64" }\n    buildTypes/' android/app/build.gradle
      
      - name: Fix AndroidManifest.xml
        run: |
          # Add permissions
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.INTERNET"/>|' android/app/src/main/AndroidManifest.xml
          # Add AMap Key
          sed -i 's|<application|<application\n        <meta-data android:name="com.amap.api.v2.apikey" android:value="e17f8ae117d84e2d2d394a2124866603"/>|' android/app/src/main/AndroidManifest.xml
          # Add flutterEmbedding V2
          sed -i 's|</application>|<meta-data android:name="flutterEmbedding" android:value="2"/>\n    </application>|' android/app/src/main/AndroidManifest.xml
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
