name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Get Flutter dependencies
      run: |
        # First get dependencies without Android platform
        flutter config --no-enable-android
        flutter pub get || true
    
    - name: Create Android platform
      run: |
        echo "Creating Android platform..."
        flutter config --enable-android
        # Don't use flutter create, manually create files
        mkdir -p android/app/src/main/java/com/example/shanjing
        mkdir -p android/app/src/main/res/values
        mkdir -p android/gradle/wrapper
        
        # Ensure settings.gradle exists
        if [ ! -f "android/settings.gradle" ]; then
          echo "Creating settings.gradle..."
          mkdir -p android
          echo 'pluginManagement {' > android/settings.gradle
          echo '    def flutterSdkPath = {' >> android/settings.gradle
          echo '        def properties = new Properties()' >> android/settings.gradle
          echo '        file("local.properties").withInputStream { properties.load(it) }' >> android/settings.gradle
          echo '        def flutterSdkPath = properties.getProperty("flutter.sdk")' >> android/settings.gradle
          echo '        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"' >> android/settings.gradle
          echo '        return flutterSdkPath' >> android/settings.gradle
          echo '    }()' >> android/settings.gradle
          echo '    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")' >> android/settings.gradle
          echo '}' >> android/settings.gradle
          echo 'plugins {' >> android/settings.gradle
          echo '    id "dev.flutter.flutter-plugin-loader" version "1.0.0"' >> android/settings.gradle
          echo '    id "com.android.application" version "8.1.0" apply false' >> android/settings.gradle
          echo '    id "org.jetbrains.kotlin.android" version "1.9.0" apply false' >> android/settings.gradle
          echo '}' >> android/settings.gradle
        fi
        
        # Ensure app/build.gradle exists
        if [ ! -f "android/app/build.gradle" ]; then
          echo "Creating app/build.gradle..."
          mkdir -p android/app
          echo 'plugins {' > android/app/build.gradle
          echo '    id "com.android.application"' >> android/app/build.gradle
          echo '    id "kotlin-android"' >> android/app/build.gradle
          echo '    id "dev.flutter.flutter-gradle-plugin"' >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'android {' >> android/app/build.gradle
          echo '    namespace = "com.example.shanjing"' >> android/app/build.gradle
          echo '    compileSdk = flutter.compileSdkVersion' >> android/app/build.gradle
          echo '    ndkVersion = flutter.ndkVersion' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo '    compileOptions {' >> android/app/build.gradle
          echo '        sourceCompatibility = JavaVersion.VERSION_17' >> android/app/build.gradle
          echo '        targetCompatibility = JavaVersion.VERSION_17' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo '    kotlinOptions {' >> android/app/build.gradle
          echo '        jvmTarget = "17"' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo '    defaultConfig {' >> android/app/build.gradle
          echo '        applicationId = "com.example.shanjing"' >> android/app/build.gradle
          echo '        minSdk = 21' >> android/app/build.gradle
          echo '        targetSdk = flutter.targetSdkVersion' >> android/app/build.gradle
          echo '        versionCode = flutter.versionCode' >> android/app/build.gradle
          echo '        versionName = flutter.versionName' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo '    buildTypes {' >> android/app/build.gradle
          echo '        release {' >> android/app/build.gradle
          echo '            signingConfig = signingConfigs.debug' >> android/app/build.gradle
          echo '        }' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'flutter {' >> android/app/build.gradle
          echo '    source = "../.."' >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
        fi
        
        # Ensure AndroidManifest.xml exists with V2 embedding
        if [ ! -f "android/app/src/main/AndroidManifest.xml" ]; then
          echo "Creating AndroidManifest.xml..."
          mkdir -p android/app/src/main
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' > android/app/src/main/AndroidManifest.xml
          echo '    <application' >> android/app/src/main/AndroidManifest.xml
          echo '        android:label="shanjing"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:name="${applicationName}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:icon="@mipmap/ic_launcher">' >> android/app/src/main/AndroidManifest.xml
          echo '        <activity' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name=".MainActivity"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:launchMode="singleTop"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:theme="@style/LaunchTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:hardwareAccelerated="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:windowSoftInputMode="adjustResize">' >> android/app/src/main/AndroidManifest.xml
          echo '            <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '              android:name="io.flutter.embedding.android.NormalTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '              android:resource="@style/NormalTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '              />' >> android/app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN"/>' >> android/app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="flutterEmbedding"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:value="2" />' >> android/app/src/main/AndroidManifest.xml
          echo '    </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml
        fi
    
    - name: Update Kotlin version
      run: |
        echo "=== Updating Kotlin version in settings.gradle ==="
        sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.0"/' android/settings.gradle
        cat android/settings.gradle | grep "org.jetbrains.kotlin.android"
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate keystore
      run: |
        mkdir -p android/app
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shanjing.keystore
    
    - name: Configure key.properties
      run: |
        cat > android/key.properties << EOL
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=shanjing
        storeFile=shanjing.keystore
        EOL
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
