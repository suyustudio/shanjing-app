name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project
        run: |
          mkdir -p android/app/src/main/java/com/example/shanjing
          mkdir -p android/app/src/main/res/values
          
          # settings.gradle
          printf '%s\n' 'pluginManagement {' '    repositories {' '        google()' '        mavenCentral()' '        gradlePluginPortal()' '    }' '    def flutterSdkPath = {' '        def properties = new Properties()' '        file("local.properties").withInputStream { properties.load(it) }' '        def flutterSdkPath = properties.getProperty("flutter.sdk")' '        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"' '        return flutterSdkPath' '    }()' '    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")' '}' 'plugins {' '    id "dev.flutter.flutter-plugin-loader" version "1.0.0"' '    id "com.android.application" version "8.1.0" apply false' '    id "org.jetbrains.kotlin.android" version "1.9.0" apply false' '}' > android/settings.gradle
          
          # build.gradle
          printf '%s\n' 'allprojects {' '    repositories {' '        google()' '        mavenCentral()' '    }' '}' 'rootProject.buildDir = "../build"' 'subprojects {' '    project.buildDir = "${rootProject.buildDir}/${project.name}"' '}' 'subprojects {' '    project.evaluationDependsOn(":app")' '}' 'tasks.register("clean", Delete) {' '    delete rootProject.buildDir' '}' > android/build.gradle
          
          # app/build.gradle
          printf '%s\n' 'plugins {' '    id "com.android.application"' '    id "kotlin-android"' '    id "dev.flutter.flutter-gradle-plugin"' '}' 'def localProperties = new Properties()' 'def localPropertiesFile = rootProject.file("local.properties")' 'if (localPropertiesFile.exists()) {' '    localPropertiesFile.withReader("UTF-8") { reader ->' '        localProperties.load(reader)' '    }' '}' 'def flutterVersionCode = localProperties.getProperty("flutter.versionCode")' 'if (flutterVersionCode == null) {' '    flutterVersionCode = "1"' '}' 'def flutterVersionName = localProperties.getProperty("flutter.versionName")' 'if (flutterVersionName == null) {' '    flutterVersionName = "1.0.0"' '}' 'android {' '    namespace = "com.example.shanjing"' '    compileSdk = 34' '    ndkVersion = "25.1.8937393"' '    compileOptions {' '        sourceCompatibility = JavaVersion.VERSION_17' '        targetCompatibility = JavaVersion.VERSION_17' '    }' '    kotlinOptions {' '        jvmTarget = "17"' '    }' '    defaultConfig {' '        applicationId = "com.example.shanjing"' '        minSdk = 21' '        targetSdk = 34' '        versionCode = flutterVersionCode.toInteger()' '        versionName = flutterVersionName' '    }' '    buildTypes {' '        release {' '            signingConfig = signingConfigs.debug' '        }' '    }' '}' 'flutter {' '    source = "../.."' '}' > android/app/build.gradle
          
          # AndroidManifest.xml (base64 encoded V2)
          mkdir -p android/app/src/main
          echo '' | base64 -d > android/app/src/main/AndroidManifest.xml
          
          # MainActivity.kt
          printf '%s\n' 'package com.example.shanjing' '' 'import io.flutter.embedding.android.FlutterActivity' '' 'class MainActivity: FlutterActivity() {' '}' > android/app/src/main/java/com/example/shanjing/MainActivity.kt
          
          # gradle.properties
          printf '%s\n' 'org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8' 'android.useAndroidX=true' 'android.enableJetifier=true' > android/gradle.properties
          
          touch android/local.properties
          
          echo "Android project created"
          ls -la android/
      
      - name: Get dependencies
        run: flutter pub get || true
      
      - name: Fix Android Manifest V2
        run: |
          # Ensure V2 embedding after flutter pub get
          mkdir -p android/app/src/main
          echo '' | base64 -d > android/app/src/main/AndroidManifest.xml
          echo "Fixed AndroidManifest.xml to V2"
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
