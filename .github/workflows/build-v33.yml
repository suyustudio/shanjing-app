name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          rm -rf android
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
      
      - name: Add AMap Maven repository
        run: |
          # Add AMap Maven repository to settings.gradle
          sed -i '/mavenCentral()/a\        maven { url "https://maven.aliyun.com/repository/public" }' android/settings.gradle
      
      - name: Fix app/build.gradle
        run: |
          # Fix minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          # Add ndk block inside defaultConfig
          sed -i '/minSdkVersion 21/a\        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"\n        }' android/app/build.gradle
          # 不手动添加高德 SDK 依赖 - 使用插件自带的依赖
      
      - name: Fix AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="山径"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.amap.api.v2.apikey"
                      android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          echo "Created valid AndroidManifest.xml"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Fix amap_flutter_map plugin dependencies
        run: |
          # 找到插件目录
          PLUGIN_DIR=$(find $PUB_CACHE -name "amap_flutter_map" -type d 2>/dev/null | head -1)
          if [ -z "$PLUGIN_DIR" ]; then
            PLUGIN_DIR="$PUB_CACHE/hosted/pub.dev/amap_flutter_map-3.0.0"
          fi
          
          PLUGIN_GRADLE="$PLUGIN_DIR/android/build.gradle"
          echo "Plugin dir: $PLUGIN_DIR"
          echo "Plugin gradle: $PLUGIN_GRADLE"
          
          if [ -f "$PLUGIN_GRADLE" ]; then
            echo "Before fix:"
            cat "$PLUGIN_GRADLE" | grep -A2 "dependencies"
            
            # 修改依赖版本
            sed -i "s/implementation 'com.amap.api:3dmap:.*/implementation 'com.amap.api:3dmap:8.1.0'/" "$PLUGIN_GRADLE"
            
            echo "After fix:"
            cat "$PLUGIN_GRADLE" | grep -A2 "dependencies"
          else
            echo "Plugin gradle not found!"
            find $PUB_CACHE -name "build.gradle" 2>/dev/null | xargs grep -l "amap" 2>/dev/null | head -5
          fi
      
      - name: Clean and rebuild
        run: |
          cd android
          ./gradlew clean
          cd ..
          flutter clean
          flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
