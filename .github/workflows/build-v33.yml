name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Get Flutter dependencies
        run: |
          flutter pub get
          # 确保插件依赖被正确链接
          flutter build apk --release --verbose 2>&1 | head -50 || true
      
      - name: Configure Android Project
        run: |
          set -x
          
          # 修复 settings.gradle - 添加高德 Maven 仓库和 Kotlin 版本
          if [ -f "android/settings.gradle" ]; then
            echo "=== Updating settings.gradle ==="
            # 更新 Kotlin 插件版本
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
            # 添加高德 Maven 仓库（如果还没有）
            if ! grep -q "amap.com" android/settings.gradle; then
              sed -i '/mavenCentral()/a\        maven { url "https://repository.amap.com/repository/maven-public/" }' android/settings.gradle
            fi
            cat android/settings.gradle
          fi
          
          # 修复 build.gradle (项目级)
          if [ -f "android/build.gradle" ]; then
            echo "=== Updating build.gradle ==="
            # 更新 Kotlin 版本（旧格式）
            sed -i 's/kotlin_version.*=.*"1\.[0-9]\+\.[0-9]\+"/kotlin_version = "1.9.10"/' android/build.gradle || true
            # 添加高德 Maven 仓库
            if ! grep -q "amap.com" android/build.gradle; then
              sed -i '/mavenCentral()/a\        maven { url "https://repository.amap.com/repository/maven-public/" }' android/build.gradle || true
            fi
            cat android/build.gradle
          fi
          
          # 修复 app/build.gradle
          if [ -f "android/app/build.gradle" ]; then
            echo "=== Updating app/build.gradle ==="
            # 设置 minSdkVersion
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            # 添加高德 Maven 仓库到 repositories
            if ! grep -q "amap.com" android/app/build.gradle; then
              sed -i '/repositories {/,/}/ { /mavenCentral()/a\        maven { url "https://repository.amap.com/repository/maven-public/" } }' android/app/build.gradle || true
            fi
            cat android/app/build.gradle
          fi
          
          # 重写 AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="山径"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.amap.api.v2.apikey"
                      android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # 确保 MainActivity 存在
          mkdir -p android/app/src/main/kotlin/com/suyustudio/shanjing
          cat > android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt << 'EOF'
          package com.suyustudio.shanjing
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Verify APK
        run: |
          echo "=== APK 大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "=== SO 库 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.so$" | head -20
          echo ""
          echo "=== 高德相关 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -iE "amap|autonavi" | head -10 || echo "未找到高德相关文件"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  test:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: shanjing-apk
          path: ./apk
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Run Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ./apk/app-release.apk \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --timeout 10m
        continue-on-error: true
