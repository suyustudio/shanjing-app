name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Create Android Project with Flutter
        run: |
          rm -rf android
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
      
      - name: Fix Kotlin version in settings.gradle
        run: |
          # Flutter 3.19 使用新的 Gradle 插件 DSL，必须在 settings.gradle 中设置 Kotlin 版本
          # 使用通用正则替换任何版本的 Kotlin 插件
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
          echo "Fixed Kotlin version in settings.gradle:"
          cat android/settings.gradle | grep kotlin
      
      - name: Add AMap Maven repository
        run: |
          # 添加高德 Maven 仓库到 settings.gradle
          sed -i '/mavenCentral()/a\        maven { url "https://maven.aliyun.com/repository/public" }' android/settings.gradle
      
      - name: Fix app/build.gradle
        run: |
          # 修复 minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          
          # 添加 ndk 块到 defaultConfig
          sed -i '/minSdkVersion 21/a\        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"\n        }' android/app/build.gradle
          
          # 使用 latest.integration 让 Gradle 自动选择兼容的高德 SDK 版本
          # 避免与 amap_flutter_map 插件内部的 compileOnly 依赖冲突
          cat >> android/app/build.gradle << 'GRADLEOF'
          
          dependencies {
              // 使用 latest.integration 自动获取兼容版本
              // 避免手动指定版本与 Flutter 插件内部版本冲突
              implementation 'com.amap.api:3dmap-location-search:latest.integration'
          }
          GRADLEOF
          echo "Fixed app/build.gradle"
          tail -10 android/app/build.gradle
      
      - name: Fix AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="山径"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.amap.api.v2.apikey"
                      android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          echo "Created valid AndroidManifest.xml"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Clean build
        run: |
          flutter clean
          flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

  # Firebase Test Lab 云测试任务
  test:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: shanjing-apk
          path: ./apk
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      
      - name: Install gcloud components
        run: |
          gcloud components install beta
          gcloud components update
      
      - name: Run Firebase Test Lab (Robo Test)
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ./apk/app-release.apk \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --timeout 10m \
            --results-dir=shanjing-app/${{ github.run_number }}
        continue-on-error: true
      
      - name: Get Test Results URL
        if: always()
        run: |
          echo "Firebase Test Lab Results:"
          echo "https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID }}/testlab/histories"
