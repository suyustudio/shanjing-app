name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          # Remove existing android directory if any
          rm -rf android
          
          # Create .env file if not exists (required by flutter_dotenv)
          if [ ! -f .env ]; then
            echo "AMAP_KEY=your_amap_key_here" > .env
            echo "Created .env file"
          fi
          
          # Use flutter create to generate proper Android project
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
          
          echo "=== Flutter created Android project ==="
          ls -la android/
      
      - name: Fix Kotlin version
        run: |
          # Flutter 3.19 uses settings.gradle for plugin versions
          echo "=== Original settings.gradle ==="
          cat android/settings.gradle
          
          # Upgrade Kotlin version in settings.gradle (handle double quotes)
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
          
          echo "=== Fixed settings.gradle ==="
          cat android/settings.gradle
      
      - name: Fix minSdkVersion and AndroidManifest
        run: |
          # Debug: show original build.gradle
          echo "=== Original android/app/build.gradle ==="
          cat android/app/build.gradle
          
          # Fix minSdkVersion - Flutter uses flutter.minSdkVersion variable
          # Replace flutter.minSdkVersion with hardcoded 21
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          echo "Fixed minSdkVersion to 21"
          grep -i "minsdk" android/app/build.gradle || echo "No minSdk found"
          
          # Add location permissions to AndroidManifest.xml
          sed -i '/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          echo "Added permissions to AndroidManifest.xml"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
