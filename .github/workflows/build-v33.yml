name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Create Android Project with Flutter
        run: |
          rm -rf android
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
      
      - name: Add AMap Maven repository
        run: |
          # Add AMap Maven repository to settings.gradle
          sed -i '/mavenCentral()/a\        maven { url "https://maven.aliyun.com/repository/public" }\n        maven { url "https://repo1.maven.org/maven2" }' android/settings.gradle
      
      - name: Fix app/build.gradle
        run: |
          # Fix minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          # Add ndk block inside defaultConfig
          sed -i '/minSdkVersion 21/a\        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"\n        }' android/app/build.gradle
      
      - name: Download and extract AMap SDK SO libraries
        run: |
          # Create jniLibs directory
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          
          # Use Gradle to download AAR files and extract SO libraries
          cd android
          
          # Add AMap dependencies to build.gradle (only navi-3dmap, it includes location and search)
          cat >> app/build.gradle << 'GRADLEOF'
          
          dependencies {
              implementation 'com.amap.api:navi-3dmap:latest.integration'
          }
          GRADLEOF
          
          # Sync and download dependencies
          ./gradlew dependencies --configuration releaseRuntimeClasspath 2>/dev/null || true
          
          # Find and extract SO files from cached AARs
          AAR_CACHE="$HOME/.gradle/caches/modules-2/files-2.1/com.amap.api"
          if [ -d "$AAR_CACHE" ]; then
            find "$AAR_CACHE" -name "*.aar" | while read aar; do
              echo "Processing: $aar"
              unzip -o "$aar" -d "${aar%.aar}_extracted" 2>/dev/null || true
            done
            
            # Copy SO files to jniLibs
            find "$AAR_CACHE" -path "*/jni/*/*.so" | while read sofile; do
              arch=$(basename $(dirname "$sofile"))
              if [ -d "app/src/main/jniLibs/$arch" ]; then
                cp "$sofile" "app/src/main/jniLibs/$arch/"
                echo "Copied $(basename $sofile) to jniLibs/$arch/"
              fi
            done
          fi
          
          cd ..
          
          # List extracted SO files
          echo "=== Extracted SO libraries ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No SO files found"
      
      - name: Fix AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="山径"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.amap.api.v2.apikey"
                      android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
          echo "Created valid AndroidManifest.xml"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
