name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      # 关键：检查 android 目录是否存在且完整
      - name: Check and Create Android Project
        run: |
          if [ ! -f "android/app/build.gradle" ]; then
            echo "Android project missing or incomplete, creating..."
            flutter config --enable-android
            flutter create --platforms=android --project-name=shanjing_app .
            echo "Created Android project"
          else
            echo "Android project exists"
          fi
      
      - name: Get Flutter dependencies
        run: |
          flutter pub get
          echo "Flutter dependencies resolved"
          # 关键：确保插件的 Android 依赖也被下载
          cd android
          ./gradlew dependencies --configuration releaseRuntimeClasspath 2>/dev/null | head -20 || echo "Gradle dependencies check completed"
      
      # 确保使用 Android embedding v2
      - name: Configure Android V2 Embedding
        run: |
          set -x  # 打印执行的命令
          
          # 检查 android/build.gradle 是否存在
          if [ ! -f "android/build.gradle" ]; then
            echo "ERROR: android/build.gradle not found"
            exit 1
          fi
          
          echo "=== Current settings.gradle Kotlin ==="
          cat android/settings.gradle | grep -i kotlin || echo "Not found in settings.gradle"
          
          echo "=== Current build.gradle Kotlin ==="
          cat android/build.gradle | grep -i kotlin || echo "Not found in build.gradle"
          
          # Flutter 3.19+ 的 Kotlin 版本在 settings.gradle 中
          if [ -f "android/settings.gradle" ]; then
            # 更新 settings.gradle 中的 Kotlin 版本（Flutter 3.19 新格式）
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
            echo "Updated Kotlin version in settings.gradle"
          fi
          
          # 同时更新 build.gradle（旧格式兼容）
          sed -i 's/kotlin_version.*=.*"1\.[0-9]\+\.[0-9]\+"/kotlin_version = "1.9.10"/' android/build.gradle || true
          
          echo "=== Updated settings.gradle ==="
          cat android/settings.gradle | grep -i kotlin || echo "Not found"
          
          echo "=== Updated build.gradle ==="
          cat android/build.gradle | grep -i kotlin || echo "Not found"
          
          # 重写 AndroidManifest.xml，确保格式正确
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="山径"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.amap.api.v2.apikey"
                      android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "Created AndroidManifest.xml"
          
          # 确保 MainActivity 使用正确的 FlutterActivity
          mkdir -p android/app/src/main/kotlin/com/suyustudio/shanjing
          cat > android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt << 'EOF'
          package com.suyustudio.shanjing
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF
          echo "Created MainActivity.kt"
          
          # 设置 minSdkVersion
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            echo "Updated minSdkVersion"
          fi
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Verify APK
        run: |
          echo "=== APK 大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "=== SO 库 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.so$" | head -20
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  test:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: shanjing-apk
          path: ./apk
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Run Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ./apk/app-release.apk \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --timeout 10m
        continue-on-error: true
