name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Setup .env with real AMap Key
        run: |
          echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Configure Android Project
        run: |
          set -x
          
          # 创建目录结构
          mkdir -p android/app/src/main
          mkdir -p android/app/src/main/kotlin/com/suyustudio/shanjing
          
          # 重写 AndroidManifest.xml - 修复 embedding v2 配置
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <application
        android:label="山径"
        android:name="${applicationName}"
        android:icon="@mipmap/ic_launcher">
        <meta-data
            android:name="com.amap.api.v2.apikey"
            android:value="e17f8ae117d84e2d2d394a2124866603" />
        <meta-data
            android:name="flutterEmbedding"
            android:value="2" />
        <activity
            android:name="io.flutter.embedding.android.FlutterActivity"
            android:exported="true"
            android:launchMode="singleTop"
            android:theme="@style/LaunchTheme"
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
            android:hardwareAccelerated="true"
            android:windowSoftInputMode="adjustResize">
            <meta-data
              android:name="io.flutter.embedding.android.NormalTheme"
              android:resource="@style/NormalTheme"
              />
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST_EOF
          
          # 确保 MainActivity 存在 - 使用正确的 embedding v2
          cat > android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt << 'MAINACTIVITY_EOF'
package com.suyustudio.shanjing

import android.os.Bundle
import com.amap.api.maps.MapsInitializer
import io.flutter.embedding.android.FlutterActivity

class MainActivity : FlutterActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        MapsInitializer.updatePrivacyShow(this, true, true)
        MapsInitializer.updatePrivacyAgree(this, true)
        super.onCreate(savedInstanceState)
    }
}
MAINACTIVITY_EOF

          # 重写 settings.gradle
          cat > android/settings.gradle << 'SETTINGS_EOF'
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven { url "https://repository.amap.com/repository/maven-public/" }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
SETTINGS_EOF

          # 重写项目级 build.gradle
          cat > android/build.gradle << 'BUILD_EOF'
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://repository.amap.com/repository/maven-public/" }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
BUILD_EOF

          # 重写 app/build.gradle
          cat > android/app/build.gradle << 'APPBUILD_EOF'
def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.suyustudio.shanjing"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.suyustudio.shanjing"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

repositories {
    maven { url "https://repository.amap.com/repository/maven-public/" }
}
APPBUILD_EOF

          echo "=== Android Configuration Complete ==="
          cat android/app/src/main/AndroidManifest.xml
          echo ""
          cat android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Verify APK
        run: |
          echo "=== APK 大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "=== SO 库 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.so$" | head -20
          echo ""
          echo "=== 高德相关 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -iE "amap|autonavi" | head -10 || echo "未找到高德相关文件"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  test:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: shanjing-apk
          path: ./apk
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Run Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ./apk/app-release.apk \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --timeout 10m
        continue-on-error: true