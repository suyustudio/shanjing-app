name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup .env with AMap Key
        run: echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Pre-build checks
        run: |
          echo "=== Flutter Doctor ==="
          flutter doctor -v
          echo ""
          echo "=== Android SDK ==="
          ls -la $ANDROID_SDK_ROOT || echo "ANDROID_SDK_ROOT not set"
          echo ""
          echo "=== Android Build Tools ==="
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools"

      - name: Build Debug APK
        run: flutter build apk --debug --verbose

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
