name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "flutter.versionCode=2" >> android/local.properties
        echo "flutter.versionName=1.0.0" >> android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK (with error capture)
      run: flutter build apk --debug 2>&1 || (echo "EXIT_CODE=$?" && exit 1)
      shell: bash
    
    - name: List APK files
      run: ls -la build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
