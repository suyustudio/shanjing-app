name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup .env with AMap Key
        run: echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "flutter.versionCode=2" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          cat android/local.properties

      - name: Build Debug APK
        run: flutter build apk --debug 2>&1 | tee build.log || { cat build.log; exit 1; }

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
