name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "flutter.versionCode=2" >> android/local.properties
        echo "flutter.versionName=1.0.0" >> android/local.properties
        cat android/local.properties
    
    - name: Flutter Doctor
      run: flutter doctor -v
    
    - name: Verify Android project
      run: |
        echo "=== Android目录 ==="
        ls -la android/
        echo ""
        echo "=== app/build.gradle 开头 ==="
        head -30 android/app/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Analyze code
      run: flutter analyze || true
    
    - name: Build APK
      run: |
        set -x  # 显示执行的命令
        flutter build apk --debug || {
          echo "=== 查看gradle错误 ==="
          cat android/build.gradle 2>/dev/null || true
          exit 1
        }
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
