name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "flutter.versionCode=2" >> android/local.properties
        echo "flutter.versionName=1.0.0" >> android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK with detailed logging
      run: |
        # 尝试构建，捕获所有输出
        flutter build apk --debug --verbose 2>&1 | tee build_output.log
        BUILD_STATUS=${PIPESTATUS[0]}
        
        if [ $BUILD_STATUS -ne 0 ]; then
          echo ""
          echo "========================================"
          echo "❌ BUILD FAILED - Last 200 lines:"
          echo "========================================"
          tail -200 build_output.log
          echo ""
          echo "========================================"
          echo "Gradle daemon logs:"
          echo "========================================"
          cat ~/.gradle/daemon/*/daemon-*.out.log 2>/dev/null | tail -100 || echo "No daemon logs"
          exit 1
        fi
        
        echo "✅ BUILD SUCCESS"
        ls -la build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
