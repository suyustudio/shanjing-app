name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Verify Android project
      run: |
        echo "=== Android目录检查 ==="
        ls -la android/
        echo ""
        echo "=== settings.gradle ==="
        cat android/settings.gradle
        echo ""
        echo "=== local.properties ==="
        cat android/local.properties 2>/dev/null || echo "文件不存在"
    
    - name: Update minSdkVersion
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        grep minSdkVersion android/app/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK with error capture
      run: |
        set -e
        echo "=== 开始构建 ==="
        flutter build apk --debug 2>&1 | tee build.log || {
          echo ""
          echo "=== 构建失败，显示最后100行日志 ==="
          tail -100 build.log
          exit 1
        }
        echo "=== 构建成功 ==="
        ls -la build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
    
    - name: Upload error log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-error-log
        path: build.log
        if-no-files-found: ignore
