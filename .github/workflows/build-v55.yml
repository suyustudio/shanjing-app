name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Verify Android project exists
      run: |
        echo "=== Android directory check ==="
        ls -la android/ || echo "WARNING: Android directory not found"
        ls -la android/app/ || echo "WARNING: android/app not found"
    
    - name: Update minSdkVersion
      run: |
        echo "=== Updating minSdkVersion ==="
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        cat android/app/build.gradle | grep minSdkVersion
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK with verbose output
      run: |
        set -e
        echo "=== Starting APK build ==="
        flutter build apk --debug --verbose 2>&1 | tee build.log
        echo "=== Build completed ==="
        ls -la build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
