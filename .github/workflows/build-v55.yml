name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: false
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "flutter.versionCode=2" >> android/local.properties
        echo "flutter.versionName=1.0.0" >> android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: |
        flutter build apk --debug 2>&1 | tee build.log
        BUILD_STATUS=${PIPESTATUS[0]}
        
        if [ $BUILD_STATUS -ne 0 ]; then
          echo "BUILD_FAILED=true" >> $GITHUB_ENV
          echo "BUILD_LOG<<EOF" >> $GITHUB_ENV
          tail -150 build.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          exit 1
        fi
        
        echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        ls -la build/app/outputs/flutter-apk/
    
    - name: Create summary on failure
      if: failure()
      run: |
        echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$BUILD_LOG" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
    
    - name: Create summary on success
      if: success()
      run: |
        echo "### ✅ Build Success" >> $GITHUB_STEP_SUMMARY
        ls -la build/app/outputs/flutter-apk/ >> $GITHUB_STEP_SUMMARY
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
