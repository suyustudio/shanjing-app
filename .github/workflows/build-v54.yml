name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Setup .env
        run: echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Create directories
        run: |
          mkdir -p android/app/src/main/kotlin/com/suyustudio/shanjing
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values
      
      - name: Create build.gradle with echo
        env:
          FLUTTER_ROOT: /opt/hostedtoolcache/flutter/stable-3.19.0-x64
        run: |
          echo 'def localProperties = new Properties()' > android/app/build.gradle
          echo 'def localPropertiesFile = rootProject.file("local.properties")' >> android/app/build.gradle
          echo 'if (localPropertiesFile.exists()) {' >> android/app/build.gradle
          echo '    localPropertiesFile.withReader("UTF-8") { reader ->' >> android/app/build.gradle
          echo '        localProperties.load(reader)' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'def flutterVersionCode = localProperties.getProperty("flutter.versionCode")' >> android/app/build.gradle
          echo 'if (flutterVersionCode == null) { flutterVersionCode = "1" }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'def flutterVersionName = localProperties.getProperty("flutter.versionName")' >> android/app/build.gradle
          echo 'if (flutterVersionName == null) { flutterVersionName = "1.0" }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo "apply plugin: 'com.android.application'" >> android/app/build.gradle
          echo "apply plugin: 'kotlin-android'" >> android/app/build.gradle
          echo "apply from: \"$FLUTTER_ROOT/packages/flutter_tools/gradle/flutter.gradle\"" >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'android {' >> android/app/build.gradle
          echo "    namespace 'com.suyustudio.shanjing'" >> android/app/build.gradle
          echo '    compileSdkVersion flutter.compileSdkVersion' >> android/app/build.gradle
          echo '    ndkVersion flutter.ndkVersion' >> android/app/build.gradle
          echo '    compileOptions {' >> android/app/build.gradle
          echo '        sourceCompatibility JavaVersion.VERSION_1_8' >> android/app/build.gradle
          echo '        targetCompatibility JavaVersion.VERSION_1_8' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '    kotlinOptions { jvmTarget = "1.8" }' >> android/app/build.gradle
          echo '    sourceSets { main.java.srcDirs += "src/main/kotlin" }' >> android/app/build.gradle
          echo '    defaultConfig {' >> android/app/build.gradle
          echo "        applicationId 'com.suyustudio.shanjing'" >> android/app/build.gradle
          echo '        minSdkVersion 21' >> android/app/build.gradle
          echo '        targetSdkVersion flutter.targetSdkVersion' >> android/app/build.gradle
          echo '        versionCode flutterVersionCode.toInteger()' >> android/app/build.gradle
          echo '        versionName flutterVersionName' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '    buildTypes {' >> android/app/build.gradle
          echo '        release { signingConfig signingConfigs.debug }' >> android/app/build.gradle
          echo '    }' >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'flutter { source "../.." }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'repositories { maven { url "https://repository.amap.com/repository/maven-public/" } }' >> android/app/build.gradle
          echo '' >> android/app/build.gradle
          echo 'dependencies {' >> android/app/build.gradle
          echo "    implementation 'com.amap.api:3dmap:10.0.600'" >> android/app/build.gradle
          echo "    implementation 'com.amap.api:search:9.7.1'" >> android/app/build.gradle
          echo "    implementation 'com.amap.api:location:6.5.1'" >> android/app/build.gradle
          echo '}' >> android/app/build.gradle
      
      - name: Verify build.gradle
        run: |
          echo "=== build.gradle ==="
          cat android/app/build.gradle
          echo ""
          echo "=== dependencies check ==="
          grep -c "implementation" android/app/build.gradle
      
      - name: Create other files
        run: |
          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml <> 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application android:label="山径" android:name="${applicationName}" android:icon="@android:drawable/sym_def_app_icon">
                  <meta-data android:name="com.amap.api.v2.apikey" android:value="e17f8ae117d84e2d2d394a2124866603" />
                  <meta-data android:name="flutterEmbedding" android:value="2" />
                  <activity android:name="io.flutter.embedding.android.FlutterActivity" android:exported="true" android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF
          
          # MainActivity.kt
          echo 'package com.suyustudio.shanjing' > android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo '' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo 'import io.flutter.embedding.android.FlutterActivity' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo '' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo 'class MainActivity : FlutterActivity()' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          
          # settings.gradle
          echo 'pluginManagement {' > android/settings.gradle
          echo '    def flutterSdkPath = {' >> android/settings.gradle
          echo '        def properties = new Properties()' >> android/settings.gradle
          echo '        file("local.properties").withInputStream { properties.load(it) }' >> android/settings.gradle
          echo '        def flutterSdkPath = properties.getProperty("flutter.sdk")' >> android/settings.gradle
          echo '        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"' >> android/settings.gradle
          echo '        return flutterSdkPath' >> android/settings.gradle
          echo '    }()' >> android/settings.gradle
          echo '    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")' >> android/settings.gradle
          echo '    repositories { google(); mavenCentral(); gradlePluginPortal(); maven { url "https://repository.amap.com/repository/maven-public/" } }' >> android/settings.gradle
          echo '}' >> android/settings.gradle
          echo 'plugins { id "dev.flutter.flutter-plugin-loader" version "1.0.0"; id "com.android.application" version "7.3.0" apply false; id "org.jetbrains.kotlin.android" version "1.9.10" apply false }' >> android/settings.gradle
          echo 'include ":app"' >> android/settings.gradle
      
      - name: Build
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - name: Verify APK
        run: |
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.so$|amap|autonavi" | head -20
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk