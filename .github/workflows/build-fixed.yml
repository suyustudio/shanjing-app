name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate keystore
      run: |
        mkdir -p android/app
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shanjing.keystore
    
    - name: Configure key.properties
      run: |
        cat > android/key.properties << EOL
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=shanjing
        storeFile=shanjing.keystore
        EOL
    
    - name: Build APK
      run: |
        set -e
        flutter build apk --release | tee build.log
        echo "=== APK Output Directory ==="
        ls -la build/app/outputs/flutter-apk/ || echo "flutter-apk not found"
        ls -la build/app/outputs/apk/release/ || echo "apk/release not found"
        echo "=== Check APK file ==="
        find build/app/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-apk
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/app/outputs/apk/release/*.apk
        if-no-files-found: error
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore
