name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Check and create Android platform
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory not found, creating..."
          flutter config --enable-android
          flutter create --platforms=android --project-name=shanjing_app .
        else
          echo "Android directory already exists"
        fi
    
    - name: Update Kotlin version
      run: |
        echo "=== Current android/build.gradle ==="
        cat android/build.gradle
        echo ""
        echo "=== Updating Kotlin version in android/build.gradle ==="
        # 在 android/build.gradle 中添加 kotlin-gradle-plugin 版本
        if grep -q "org.jetbrains.kotlin:kotlin-gradle-plugin" android/build.gradle; then
          sed -i 's/org.jetbrains.kotlin:kotlin-gradle-plugin:[^"]*"/org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"/' android/build.gradle
          echo "Updated kotlin-gradle-plugin version"
        else
          echo "WARNING: Could not find kotlin-gradle-plugin pattern"
        fi
        echo ""
        echo "=== Updated android/build.gradle ==="
        cat android/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate keystore
      run: |
        mkdir -p android/app
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shanjing.keystore
    
    - name: Configure key.properties
      run: |
        cat > android/key.properties << EOL
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=shanjing
        storeFile=shanjing.keystore
        EOL
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
