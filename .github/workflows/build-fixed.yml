name: Build and Release APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate keystore
      run: |
        mkdir -p android/app
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shanjing.keystore
        ls -la android/app/shanjing.keystore
    
    - name: Configure key.properties
      run: |
        cat > android/key.properties << EOL
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=shanjing
        storeFile=shanjing.keystore
        EOL
        cat android/key.properties
    
    - name: Build APK
      run: |
        flutter build apk --release --verbose || true
        echo "=== Check build output ==="
        find . -name "*.apk" -type f 2>/dev/null | head -10 || echo "No APK found"
        echo "=== Check build directory ==="
        ls -la build/ 2>/dev/null || echo "No build directory"
        ls -la build/app/ 2>/dev/null || echo "No build/app directory"
        ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shanjing-apk
        path: build/app/outputs/**/*.apk
        if-no-files-found: warn
