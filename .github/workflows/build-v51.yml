name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false
      
      - name: Setup .env with real AMap Key
        run: echo "AMAP_KEY=e17f8ae117d84e2d2d394a2124866603" > .env
      
      - name: Create Android directories
        run: |
          mkdir -p android/app/src/main/kotlin/com/suyustudio/shanjing
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values
      
      - name: Create AndroidManifest.xml
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <application' >> android/app/src/main/AndroidManifest.xml
          echo '        android:label="山径"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:name="${applicationName}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:icon="@android:drawable/sym_def_app_icon">' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="com.amap.api.v2.apikey"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:value="e17f8ae117d84e2d2d394a2124866603" />' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="flutterEmbedding"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:value="2" />' >> android/app/src/main/AndroidManifest.xml
          echo '        <activity' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="io.flutter.embedding.android.FlutterActivity"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:launchMode="singleTop"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:theme="@style/LaunchTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:hardwareAccelerated="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:windowSoftInputMode="adjustResize">' >> android/app/src/main/AndroidManifest.xml
          echo '            <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '              android:name="io.flutter.embedding.android.NormalTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '              android:resource="@style/NormalTheme"' >> android/app/src/main/AndroidManifest.xml
          echo '              />' >> android/app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN"/>' >> android/app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '    </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml
      
      - name: Create MainActivity.kt
        run: |
          echo 'package com.suyustudio.shanjing' > android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo '' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo 'import io.flutter.embedding.android.FlutterActivity' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo '' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt
          echo 'class MainActivity : FlutterActivity()' >> android/app/src/main/kotlin/com/suyustudio/shanjing/MainActivity.kt

      - name: Create settings.gradle
        run: |
          echo 'pluginManagement {' > android/settings.gradle
          echo '    def flutterSdkPath = {' >> android/settings.gradle
          echo '        def properties = new Properties()' >> android/settings.gradle
          echo '        file("local.properties").withInputStream { properties.load(it) }' >> android/settings.gradle
          echo '        def flutterSdkPath = properties.getProperty("flutter.sdk")' >> android/settings.gradle
          echo '        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"' >> android/settings.gradle
          echo '        return flutterSdkPath' >> android/settings.gradle
          echo '    }()' >> android/settings.gradle
          echo '' >> android/settings.gradle
          echo '    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")' >> android/settings.gradle
          echo '' >> android/settings.gradle
          echo '    repositories {' >> android/settings.gradle
          echo '        google()' >> android/settings.gradle
          echo '        mavenCentral()' >> android/settings.gradle
          echo '        gradlePluginPortal()' >> android/settings.gradle
          echo '        maven { url "https://repository.amap.com/repository/maven-public/" }' >> android/settings.gradle
          echo '    }' >> android/settings.gradle
          echo '}' >> android/settings.gradle
          echo '' >> android/settings.gradle
          echo 'plugins {' >> android/settings.gradle
          echo '    id "dev.flutter.flutter-plugin-loader" version "1.0.0"' >> android/settings.gradle
          echo '    id "com.android.application" version "7.3.0" apply false' >> android/settings.gradle
          echo '    id "org.jetbrains.kotlin.android" version "1.9.10" apply false' >> android/settings.gradle
          echo '}' >> android/settings.gradle
          echo '' >> android/settings.gradle
          echo 'include ":app"' >> android/settings.gradle

      - name: Create gradle.properties
        run: |
          echo 'org.gradle.jvmargs=-Xmx4G' > android/gradle.properties
          echo 'android.useAndroidX=true' >> android/gradle.properties
          echo 'android.enableJetifier=true' >> android/gradle.properties

      - name: Create launch_background.xml
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/drawable/launch_background.xml
          echo '<layer-list xmlns:android="http://schemas.android.com/apk/res/android">' >> android/app/src/main/res/drawable/launch_background.xml
          echo '    <item android:drawable="?android:colorBackground" />' >> android/app/src/main/res/drawable/launch_background.xml
          echo '</layer-list>' >> android/app/src/main/res/drawable/launch_background.xml

      - name: Create styles.xml
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/styles.xml
          echo '<resources>' >> android/app/src/main/res/values/styles.xml
          echo '    <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">' >> android/app/src/main/res/values/styles.xml
          echo '        <item name="android:windowBackground">@drawable/launch_background</item>' >> android/app/src/main/res/values/styles.xml
          echo '    </style>' >> android/app/src/main/res/values/styles.xml
          echo '    <style name="NormalTheme" parent="@android:style/Theme.Light.NoTitleBar">' >> android/app/src/main/res/values/styles.xml
          echo '        <item name="android:windowBackground">?android:colorBackground</item>' >> android/app/src/main/res/values/styles.xml
          echo '    </style>' >> android/app/src/main/res/values/styles.xml
          echo '</resources>' >> android/app/src/main/res/values/styles.xml

      - name: Create project build.gradle
        run: |
          echo 'allprojects {' > android/build.gradle
          echo '    repositories {' >> android/build.gradle
          echo '        google()' >> android/build.gradle
          echo '        mavenCentral()' >> android/build.gradle
          echo '        maven { url "https://repository.amap.com/repository/maven-public/" }' >> android/build.gradle
          echo '    }' >> android/build.gradle
          echo '}' >> android/build.gradle
          echo '' >> android/build.gradle
          echo 'rootProject.buildDir = "../build"' >> android/build.gradle
          echo 'subprojects {' >> android/build.gradle
          echo '    project.buildDir = "${rootProject.buildDir}/${project.name}"' >> android/build.gradle
          echo '}' >> android/build.gradle
          echo 'subprojects {' >> android/build.gradle
          echo '    project.evaluationDependsOn(":app")' >> android/build.gradle
          echo '}' >> android/build.gradle
          echo '' >> android/build.gradle
          echo 'tasks.register("clean", Delete) {' >> android/build.gradle
          echo '    delete rootProject.buildDir' >> android/build.gradle
          echo '}' >> android/build.gradle

      - name: Create app build.gradle
        run: |
          FLUTTER_ROOT="${FLUTTER_ROOT:-/opt/hostedtoolcache/flutter/stable-3.19.0-x64}"
          
          echo "def localProperties = new Properties()" > android/app/build.gradle
          echo "def localPropertiesFile = rootProject.file('local.properties')" >> android/app/build.gradle
          echo "if (localPropertiesFile.exists()) {" >> android/app/build.gradle
          echo "    localPropertiesFile.withReader('UTF-8') { reader ->" >> android/app/build.gradle
          echo "        localProperties.load(reader)" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "def flutterVersionCode = localProperties.getProperty('flutter.versionCode')" >> android/app/build.gradle
          echo "if (flutterVersionCode == null) {" >> android/app/build.gradle
          echo "    flutterVersionCode = '1'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "def flutterVersionName = localProperties.getProperty('flutter.versionName')" >> android/app/build.gradle
          echo "if (flutterVersionName == null) {" >> android/app/build.gradle
          echo "    flutterVersionName = '1.0'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "apply plugin: 'com.android.application'" >> android/app/build.gradle
          echo "apply plugin: 'kotlin-android'" >> android/app/build.gradle
          echo "apply from: \"$FLUTTER_ROOT/packages/flutter_tools/gradle/flutter.gradle\"" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "android {" >> android/app/build.gradle
          echo "    namespace 'com.suyustudio.shanjing'" >> android/app/build.gradle
          echo "    compileSdkVersion flutter.compileSdkVersion" >> android/app/build.gradle
          echo "    ndkVersion flutter.ndkVersion" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "    compileOptions {" >> android/app/build.gradle
          echo "        sourceCompatibility JavaVersion.VERSION_1_8" >> android/app/build.gradle
          echo "        targetCompatibility JavaVersion.VERSION_1_8" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "    kotlinOptions {" >> android/app/build.gradle
          echo "        jvmTarget = '1.8'" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "    sourceSets {" >> android/app/build.gradle
          echo "        main.java.srcDirs += 'src/main/kotlin'" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "    defaultConfig {" >> android/app/build.gradle
          echo "        applicationId 'com.suyustudio.shanjing'" >> android/app/build.gradle
          echo "        minSdkVersion 21" >> android/app/build.gradle
          echo "        targetSdkVersion flutter.targetSdkVersion" >> android/app/build.gradle
          echo "        versionCode flutterVersionCode.toInteger()" >> android/app/build.gradle
          echo "        versionName flutterVersionName" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "    buildTypes {" >> android/app/build.gradle
          echo "        release {" >> android/app/build.gradle
          echo "            signingConfig signingConfigs.debug" >> android/app/build.gradle
          echo "        }" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "flutter {" >> android/app/build.gradle
          echo "    source '../..'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "repositories {" >> android/app/build.gradle
          echo "    maven { url 'https://repository.amap.com/repository/maven-public/' }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo "    implementation 'com.amap.api:3dmap:10.0.600'" >> android/app/build.gradle
          echo "    implementation 'com.amap.api:search:9.7.1'" >> android/app/build.gradle
          echo "    implementation 'com.amap.api:location:6.5.1'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
      
      - name: Debug - Show build.gradle content
        run: |
          echo "=== build.gradle content ==="
          cat android/app/build.gradle
          echo ""
          echo "=== Check dependencies ==="
          grep -A10 "dependencies {" android/app/build.gradle || echo "No dependencies block found!"
      
      - name: Get Flutter dependencies
        run: |
          flutter clean
          flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Verify APK
        run: |
          echo "=== APK 大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "=== SO 库 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.so$" | head -20
          echo ""
          echo "=== 高德相关 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -iE "amap|autonavi" | head -10 || echo "未找到高德相关文件"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk