name: Build and Release APK (Fixed) v2

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create Android Project
      run: |
        echo "=== Creating Android project ==="
        flutter config --enable-android
        # 如果 android 目录不存在，创建它
        if [ ! -d "android" ]; then
          echo "Creating android directory..."
          flutter create --platforms=android --project-name=shanjing .
        fi
        # 检查目录结构
        echo "=== Directory structure ==="
        ls -la
        if [ -d "android" ]; then
          echo "=== Android directory ==="
          ls -la android/
        fi
        if [ -f "android/settings.gradle" ]; then
          echo "=== settings.gradle exists ==="
          cat android/settings.gradle
        else
          echo "=== Creating settings.gradle ==="
          mkdir -p android
          cat > android/settings.gradle << 'EOF'
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}
EOF
        fi
    
    - name: Setup Android files
      run: |
        echo "=== Setting up Android build files ==="
        # 确保 app/build.gradle 存在
        if [ ! -f "android/app/build.gradle" ]; then
          mkdir -p android/app
          cat > android/app/build.gradle << 'EOF'
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}
android {
    namespace = "com.suyustudio.shanjing"
    compileSdk = 34
    ndkVersion = "25.1.8937393"
    
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
    
    defaultConfig {
        applicationId = "com.suyustudio.shanjing"
        minSdk = 21
        targetSdk = 34
        versionCode = 1
        versionName = "1.0.0"
    }
    
    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}
flutter {
    source = '../..'
}
EOF
        fi
        
        # 确保 build.gradle 存在
        if [ ! -f "android/build.gradle" ]; then
          cat > android/build.gradle << 'EOF'
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}
tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
EOF
        fi
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-apk
        path: build/app/outputs/flutter-apk/*.apk
        if-no-files-found: warn
