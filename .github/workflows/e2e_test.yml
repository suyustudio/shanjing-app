# .github/workflows/e2e_test.yml
# GitHub Actions E2E测试工作流

name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'qa/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - '.github/workflows/e2e_test.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天凌晨2点运行 (UTC时间)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: '测试类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - e2e
          - compatibility

jobs:
  # 代码检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Analyze
        run: flutter analyze
      
      - name: Format check
        run: dart format --set-exit-if-changed lib/ qa/

  # 单元测试
  unit_test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run unit tests
        run: flutter test test/ --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # E2E测试 - Android
  e2e_android:
    runs-on: macos-latest
    needs: unit_test
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event_name == 'pull_request'
    timeout-minutes: 60
    strategy:
      matrix:
        api-level: [29, 33, 34]
        target: [default]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK for testing
        run: flutter build apk --debug
      
      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: Nexus 6
          script: |
            # 创建测试结果目录
            mkdir -p test-results
            
            # 运行E2E测试 - 使用正确的integration_test命令
            flutter test integration_test/ qa/m4/p2_testing/automation/e2e/ \
              --reporter expanded 2>&1 | tee test-results/e2e-android-api${{ matrix.api-level }}.log
            
            # 检查测试结果
            exit ${PIPESTATUS[0]}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-results-api${{ matrix.api-level }}
          path: |
            test-results/
            coverage/
          retention-days: 7

  # E2E测试 - iOS
  e2e_ios:
    runs-on: macos-latest
    needs: unit_test
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event_name == 'pull_request'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS for simulator
        run: flutter build ios --simulator
      
      - name: Run E2E tests
        run: |
          # 创建测试结果目录
          mkdir -p test-results
          
          # 运行E2E测试
          flutter test integration_test/ qa/m4/p2_testing/automation/e2e/ \
            --reporter expanded 2>&1 | tee test-results/e2e-ios.log
          
          # 检查测试结果
          exit ${PIPESTATUS[0]}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  # 烟雾测试
  smoke_test:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run smoke tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          script: |
            # 创建测试结果目录
            mkdir -p test-results
            
            # 运行烟雾测试 - 修复路径
            flutter test qa/m4/p2_testing/automation/e2e/regressions/smoke_test.dart \
              --reporter expanded 2>&1 | tee test-results/smoke-test.log
            
            # 检查测试结果 - 不再忽略失败
            exit ${PIPESTATUS[0]}
      
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/

  # 性能测试
  performance_test:
    runs-on: macos-latest
    needs: smoke_test
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'all'
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run performance tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          script: |
            # 创建测试结果目录
            mkdir -p test-results
            
            # 运行性能测试 - 修复路径和命令
            flutter test qa/m4/p2_testing/performance/ \
              --reporter json > test-results/performance_results.json 2>&1
            
            # 同时生成文本报告
            flutter test qa/m4/p2_testing/performance/ \
              --reporter expanded 2>&1 | tee test-results/performance.log
            
            # 检查测试结果
            exit ${PIPESTATUS[0]}
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            test-results/
            coverage/

  # 兼容性测试
  compatibility_test:
    runs-on: ubuntu-latest
    needs: smoke_test
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'compatibility'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Build release APK
        run: flutter build apk --release
      
      - name: Upload APK for manual testing
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 生成测试报告
  test_report:
    runs-on: ubuntu-latest
    needs: [e2e_android, e2e_ios, smoke_test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-results*'
      
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f
      
      - name: Generate test report
        run: |
          echo "# E2E测试报告" > test-report.md
          echo "" >> test-report.md
          echo "## 执行摘要" >> test-report.md
          echo "" >> test-report.md
          echo "| 工作流 | 状态 |" >> test-report.md
          echo "|--------|------|" >> test-report.md
          echo "| E2E Android | ${{ needs.e2e_android.result }} |" >> test-report.md
          echo "| E2E iOS | ${{ needs.e2e_ios.result }} |" >> test-report.md
          echo "| Smoke Test | ${{ needs.smoke_test.result }} |" >> test-report.md
          echo "" >> test-report.md
          echo "## 执行详情" >> test-report.md
          echo "" >> test-report.md
          echo "- 执行时间: $(date)" >> test-report.md
          echo "- 触发方式: ${{ github.event_name }}" >> test-report.md
          echo "- 分支: ${{ github.ref }}" >> test-report.md
          echo "- 提交: ${{ github.sha }}" >> test-report.md
          echo "" >> test-report.md
          echo "## 测试日志" >> test-report.md
          echo "" >> test-report.md
          echo "测试日志已作为artifact上传，可下载查看详细结果。" >> test-report.md
          
          # 显示报告
          cat test-report.md
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.md
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            }).catch(e => console.log('Comment failed:', e));
