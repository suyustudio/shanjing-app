name: Release Build - Full Features

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  AMAP_KEY: ${{ secrets.AMAP_KEY }}

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Flutter dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          ${{ github.workspace }}/.dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-
    
    - name: Enable Android platform
      run: |
        flutter config --enable-android
        flutter create --platforms=android . \
          --org com.suyustudio.shanjing \
          --project-name shanjing
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Analyze code
      run: flutter analyze --no-fatal-infos --no-fatal-warnings || true
    
    - name: Run tests
      run: flutter test || true
    
    - name: Setup Android signing
      run: |
        cd android
        mkdir -p app
        # Generate release keystore
        keytool -genkey -v \
          -keystore app/shanjing.keystore \
          -alias shanjing \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass shanjing123 \
          -keypass shanjing123 \
          -dname "CN=Shanjing App, OU=Development, O=SuyuStudio, L=Hangzhou, ST=Zhejiang, C=CN"
        # Create key.properties
        cat > key.properties << EOF
        storePassword=shanjing123
        keyPassword=shanjing123
        keyAlias=shanjing
        storeFile=app/shanjing.keystore
        EOF
    
    - name: Configure Android build - Project level
      run: |
        cd android
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.9.10'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.buildDir = '../build'
        subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
        }
        subprojects {
            project.evaluationDependsOn(':app')
        }
        
        tasks.register("clean", Delete) {
            delete rootProject.buildDir
        }
        EOF
    
    - name: Configure Android build - App level
      run: |
        cd android/app
        cat > build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        
        def keystoreProperties = new Properties()
        def keystorePropertiesFile = rootProject.file('key.properties')
        if (keystorePropertiesFile.exists()) {
            keystorePropertiesFile.withReader('UTF-8') { reader ->
                keystoreProperties.load(reader)
            }
        }
        
        android {
            namespace = "com.suyustudio.shanjing"
            compileSdk = 34
            ndkVersion = "25.1.8937393"
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = '17'
            }
            
            lintOptions {
                disable 'InvalidPackage'
                checkReleaseBuilds false
                abortOnError false
            }
            
            defaultConfig {
                applicationId = "com.suyustudio.shanjing"
                minSdk = 21
                targetSdk = 34
                versionCode = ${{ github.run_number }}
                versionName = "${{ github.ref_name }}"
            }
            
            signingConfigs {
                release {
                    keyAlias = keystoreProperties['keyAlias']
                    keyPassword = keystoreProperties['keyPassword']
                    storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                    storePassword = keystoreProperties['storePassword']
                }
            }
            
            buildTypes {
                release {
                    signingConfig = signingConfigs.release
                    minifyEnabled = false
                    shrinkResources = false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
                debug {
                    signingConfig = signingConfigs.debug
                }
            }
        }
        
        flutter {
            source = '../..'
        }
        EOF
    
    - name: Build Release APK
      run: |
        flutter build apk --release --verbose 2>&1 | tee build.log
        echo "Build exit code: $?"
    
    - name: Build App Bundle (for Play Store)
      run: flutter build appbundle --release || true
    
    - name: Verify APK
      run: |
        echo "=== APK Info ==="
        find build -name "*.apk" -type f -exec ls -lh {} \;
        find build -name "*.apk" -type f -exec file {} \;
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-release-apk
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/apk/release/app-release.apk
        if-no-files-found: warn
    
    - name: Upload App Bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: shanjing-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        if-no-files-found: ignore
    
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/apk/release/app-release.apk
          build/app/outputs/bundle/release/app-release.aab
        body: |
          ## 山径APP ${{ github.ref_name }}
          
          ### 构建信息
          - 版本: ${{ github.ref_name }}
          - 构建号: ${{ github.run_number }}
          - 构建时间: ${{ github.event.head_commit.timestamp }}
          
          ### 功能特性
          - ✅ 地图浏览与导航
          - ✅ 路线发现与搜索
          - ✅ 离线地图支持
          - ✅ 用户个人中心
          - ✅ 性能优化
          
          ### 安装要求
          - Android 8.0+ (API 26+)
          - 约 50MB 存储空间
          
          ### 下载
          - APK: 直接下载安装
          - AAB: Google Play 上架用
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
