name: Build Test - Minimal

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Check pubspec.yaml syntax
        run: |
          cat pubspec.yaml
          echo ""
          echo "=== YAML Check ==="
          python3 -c "import yaml; yaml.safe_load(open('pubspec.yaml'))" && echo "YAML OK"

      - name: Test pub get (ignore errors)
        run: |
          flutter pub get 2>&1 || echo "Exit code: $?"
