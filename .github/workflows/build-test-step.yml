name: Build Test - Step by Step

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Test step (1=debug, 2=release, 3=full)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

env:
  AMAP_KEY: ${{ secrets.AMAP_KEY }}

jobs:
  build-step-1:
    if: github.event.inputs.step == '1'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    - run: flutter config --enable-android
    - run: flutter create --platforms=android . --org com.suyustudio.shanjing --project-name shanjing
    - run: flutter pub get
    - run: flutter build apk --debug
    - uses: actions/upload-artifact@v4
      with:
        name: apk-debug-step1
        path: build/app/outputs/**/*.apk

  build-step-2:
    if: github.event.inputs.step == '2'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    - run: flutter config --enable-android
    - run: flutter create --platforms=android . --org com.suyustudio.shanjing --project-name shanjing
    - run: flutter pub get
    - name: Setup signing
      run: |
        cd android
        mkdir -p app
        keytool -genkey -v -keystore app/shanjing.keystore -alias shanjing \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass shanjing123 -keypass shanjing123 \
          -dname "CN=Shanjing App, OU=Development, O=SuyuStudio, L=Hangzhou, ST=Zhejiang, C=CN"
        cat > key.properties << EOF
        storePassword=shanjing123
        keyPassword=shanjing123
        keyAlias=shanjing
        storeFile=app/shanjing.keystore
        EOF
    - name: Configure build.gradle
      run: |
        cd android
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.9.10'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects { repositories { google(); mavenCentral() } }
        rootProject.buildDir = '../build'
        subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
        subprojects { project.evaluationDependsOn(':app') }
        tasks.register("clean", Delete) { delete rootProject.buildDir }
        EOF
        cd app
        cat > build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        def keystoreProperties = new Properties()
        def keystorePropertiesFile = rootProject.file('key.properties')
        if (keystorePropertiesFile.exists()) {
            keystorePropertiesFile.withReader('UTF-8') { reader ->
                keystoreProperties.load(reader)
            }
        }
        android {
            namespace = "com.suyustudio.shanjing"
            compileSdk = 34
            ndkVersion = "25.1.8937393"
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
            defaultConfig {
                applicationId = "com.suyustudio.shanjing"
                minSdk = 21
                targetSdk = 34
                versionCode = 1
                versionName = "1.0.0"
            }
            signingConfigs {
                release {
                    keyAlias = keystoreProperties['keyAlias']
                    keyPassword = keystoreProperties['keyPassword']
                    storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                    storePassword = keystoreProperties['storePassword']
                }
            }
            buildTypes {
                release {
                    signingConfig = signingConfigs.release
                    minifyEnabled = false
                    shrinkResources = false
                }
            }
        }
        flutter { source = '../..' }
        EOF
    - run: flutter build apk --release
    - uses: actions/upload-artifact@v4
      with:
        name: apk-release-step2
        path: build/app/outputs/**/*.apk

  build-step-3:
    if: github.event.inputs.step == '3'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    - run: flutter config --enable-android
    - run: flutter create --platforms=android . --org com.suyustudio.shanjing --project-name shanjing
    - run: flutter pub get
    - name: Setup signing
      run: |
        cd android
        mkdir -p app
        keytool -genkey -v -keystore app/shanjing.keystore -alias shanjing \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass shanjing123 -keypass shanjing123 \
          -dname "CN=Shanjing App, OU=Development, O=SuyuStudio, L=Hangzhou, ST=Zhejiang, C=CN"
        cat > key.properties << EOF
        storePassword=shanjing123
        keyPassword=shanjing123
        keyAlias=shanjing
        storeFile=app/shanjing.keystore
        EOF
    - name: Configure build.gradle
      run: |
        cd android
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.9.10'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects { repositories { google(); mavenCentral() } }
        rootProject.buildDir = '../build'
        subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
        subprojects { project.evaluationDependsOn(':app') }
        tasks.register("clean", Delete) { delete rootProject.buildDir }
        EOF
        cd app
        cat > build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        def keystoreProperties = new Properties()
        def keystorePropertiesFile = rootProject.file('key.properties')
        if (keystorePropertiesFile.exists()) {
            keystorePropertiesFile.withReader('UTF-8') { reader ->
                keystoreProperties.load(reader)
            }
        }
        android {
            namespace = "com.suyustudio.shanjing"
            compileSdk = 34
            ndkVersion = "25.1.8937393"
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
            lintOptions { disable 'InvalidPackage'; checkReleaseBuilds false }
            defaultConfig {
                applicationId = "com.suyustudio.shanjing"
                minSdk = 21
                targetSdk = 34
                versionCode = 1
                versionName = "1.0.0"
            }
            signingConfigs {
                release {
                    keyAlias = keystoreProperties['keyAlias']
                    keyPassword = keystoreProperties['keyPassword']
                    storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                    storePassword = keystoreProperties['storePassword']
                }
            }
            buildTypes {
                release {
                    signingConfig = signingConfigs.release
                    minifyEnabled = false
                    shrinkResources = false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
        }
        flutter { source = '../..' }
        EOF
    - run: flutter build apk --release --verbose
    - name: Find APK
      run: find . -name "*.apk" -type f
    - uses: actions/upload-artifact@v4
      with:
        name: apk-release-step3
        path: build/app/outputs/**/*.apk
