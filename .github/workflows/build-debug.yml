name: Build APK with Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Check Flutter
        run: |
          flutter doctor -v
          flutter --version

      - name: Setup .env with AMap Key
        run: echo "AMAP_KEY=${{ secrets.AMAP_KEY }}" > .env

      - name: Get Flutter dependencies (with debug)
        run: |
          echo "=== Running flutter pub get ==="
          flutter pub get || {
            echo "=== flutter pub get FAILED ==="
            echo "=== Checking pubspec.yaml ==="
            cat pubspec.yaml
            exit 1
          }

      - name: Setup local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionCode=2" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
        env:
          FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shanjing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
