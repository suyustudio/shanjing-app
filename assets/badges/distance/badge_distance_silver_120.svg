<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120">
  <defs>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8A8A8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="60%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <filter id="silverGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="40" cy="40" r="38" fill="none" stroke="#C0C0C0" stroke-width="1" opacity="0.3" filter="url(#silverGlow)"/>
  <circle cx="40" cy="40" r="36" fill="url(#silverGradient)" stroke="#808080" stroke-width="2"/>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#808080" stroke-width="1"/>
  <circle cx="40" cy="40" r="28" fill="none" stroke="#A0A0A0" stroke-width="0.5"/>
  
  <!-- 50km 路牌+路径 -->
  <g transform="translate(40, 40) rotate(-10)">
    <!-- 路径 -->
    <path d="M -25,22 Q -10,18 0,20 T 25,15" fill="none" stroke="#606060" stroke-width="2" stroke-dasharray="3,2"/>
    
    <!-- 路牌柱 -->
    <rect x="-3" y="0" width="6" height="22" fill="#606060" rx="1"/>
    
    <!-- 路牌板 -->
    <rect x="-20" y="-18" width="40" height="22" fill="#C0C0C0" stroke="#606060" stroke-width="1.5" rx="2"/>
    
    <!-- 文字 50km -->
    <text x="0" y="-4" text-anchor="middle" font-size="11" font-weight="bold" fill="#404040">50</text>
    <text x="0" y="6" text-anchor="middle" font-size="7" fill="#404040">km</text>
  </g>
  
  <ellipse cx="28" cy="22" rx="10" ry="6" fill="rgba(255,255,255,0.5)" transform="rotate(-30, 28, 22)"/>
</svg>