<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120">
  <defs>
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B87333"/>
      <stop offset="50%" style="stop-color:#CD7F32"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
    <linearGradient id="bronzeShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="50%" style="stop-color:#CD7F32"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  
  <circle cx="40" cy="40" r="36" fill="url(#bronzeGradient)" stroke="#8B4513" stroke-width="2"/>
  <circle cx="40" cy="40" r="30" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.5"/>
  
  <!-- 小火苗 -->
  <g transform="translate(40, 42)">
    <path d="M 0,10 C -8,5 -10,-5 -5,-12 C -3,-15 -1,-18 0,-22 C 1,-18 3,-15 5,-12 C 10,-5 8,5 0,10" fill="url(#flameGradient)"/>
    <!-- 内焰 -->
    <path d="M 0,6 C -4,2 -5,-3 -3,-7 C -2,-9 0,-12 0,-15 C 0,-12 2,-9 3,-7 C 5,-3 4,2 0,6" fill="#D4A574" opacity="0.7"/>
    
    <!-- 核心 -->
    <path d="M 0,3 C -2,1 -3,-2 -2,-4 C 0,-6 0,-8 0,-8 C 0,-8 0,-6 2,-4 C 3,-2 2,1 0,3" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <!-- 3天 -->
  <text x="40" y="68" text-anchor="middle" font-size="9" font-weight="bold" fill="#5D3A1A">3天</text>
  
  <ellipse cx="30" cy="25" rx="12" ry="8" fill="url(#bronzeShine)" transform="rotate(-30, 30, 25)"/>
</svg>