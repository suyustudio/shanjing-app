<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <!-- 选中状态发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 终点标记 - 水滴形定位针 -->
  <g filter="url(#shadow)">
    <!-- 外描边 -->
    <path d="M24 4 
             C14.5 4, 7 11.5, 7 21 
             C7 28.5, 12 35, 24 46 
             C36 35, 41 28.5, 41 21 
             C41 11.5, 33.5 4, 24 4 Z" 
          fill="#D84315" 
          stroke="#BF360C" 
          stroke-width="2"/>
    
    <!-- 主体填充 -->
    <path d="M24 6 
             C15.5 6, 9 12.5, 9 21 
             C9 27.5, 13.5 33.5, 24 43 
             C34.5 33.5, 39 27.5, 39 21 
             C39 12.5, 32.5 6, 24 6 Z" 
          fill="#FF5722"/>
    
    <!-- 高光效果 -->
    <ellipse cx="20" cy="16" rx="6" ry="4" fill="#FF8A65" opacity="0.5"/>
    
    <!-- 白色"终"字 -->
    <text x="24" y="26" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="14" 
          font-weight="bold" 
          fill="#FFFFFF" 
          text-anchor="middle"
          dominant-baseline="middle">终</text>
  </g>
</svg>