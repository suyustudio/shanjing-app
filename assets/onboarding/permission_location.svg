<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="locBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5F3"/>
      <stop offset="100%" stop-color="#D1F0EA"/>
    </linearGradient>
    <linearGradient id="locIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D968A"/>
      <stop offset="100%" stop-color="#1A6B5F"/>
    </linearGradient>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5F3"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="url(#locBg)"/>
  
  <!-- 地图网格 -->
  <g opacity="0.3">
    <line x1="30" y1="60" x2="170" y2="60" stroke="#2D968A" stroke-width="1"/>
    <line x1="30" y1="100" x2="170" y2="100" stroke="#2D968A" stroke-width="1"/>
    <line x1="30" y1="140" x2="170" y2="140" stroke="#2D968A" stroke-width="1"/>
    <line x1="60" y1="30" x2="60" y2="170" stroke="#2D968A" stroke-width="1"/>
    <line x1="100" y1="30" x2="100" y2="170" stroke="#2D968A" stroke-width="1"/>
    <line x1="140" y1="30" x2="140" y2="170" stroke="#2D968A" stroke-width="1"/>
  </g>
  
  <!-- 地图路线 -->
  <path d="M50 130 Q70 110 90 120 T130 90 T160 70" 
        stroke="#2D968A" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- 小地图标记 -->
  <g transform="translate(70, 105)">
    <path d="M0 -12 C-6 -12 -10 -6 -10 0 C-10 8 0 18 0 18 C0 18 10 8 10 0 C10 -6 6 -12 0 -12 Z" 
          fill="#2D968A" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#2D968A"/>
  </g>
  
  <g transform="translate(130, 85)">
    <path d="M0 -12 C-6 -12 -10 -6 -10 0 C-10 8 0 18 0 18 C0 18 10 8 10 0 C10 -6 6 -12 0 -12 Z" 
          fill="#2D968A" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#2D968A"/>
  </g>
  
  <!-- 主GPS/定位图标 -->
  <g transform="translate(100, 100)">
    <!-- 信号波纹 -->
    <circle cx="0" cy="0" r="55" stroke="#2D968A" stroke-width="2" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="45" stroke="#2D968A" stroke-width="2" fill="none" opacity="0.3"/>
    <circle cx="0" cy="0" r="35" stroke="#2D968A" stroke-width="2" fill="none" opacity="0.4"/>
    
    <!-- 图标背景 -->
    <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#2D968A" stroke-width="2"/>
    
    <!-- 定位标记 -->
    <path d="M0 -18 C-8 -18 -14 -10 -14 -2 C-14 10 0 24 0 24 C0 24 14 10 14 -2 C14 -10 8 -18 0 -18 Z" 
          fill="url(#locIcon)"/>
    <circle cx="0" cy="-4" r="5" fill="#FFFFFF"/>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="40" cy="50" r="4" fill="#2D968A" opacity="0.4"/>
  <circle cx="160" cy="150" r="4" fill="#2D968A" opacity="0.4"/>
  <circle cx="150" cy="45" r="3" fill="#2D968A" opacity="0.3"/>
  <circle cx="45" cy="155" r="3" fill="#2D968A" opacity="0.3"/>
</svg>