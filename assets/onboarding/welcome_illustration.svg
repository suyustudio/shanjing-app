<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5F3"/>
      <stop offset="100%" stop-color="#FAFBFB"/>
    </linearGradient>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="mountainFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DD3C0"/>
      <stop offset="100%" stop-color="#2D968A"/>
    </linearGradient>
    <linearGradient id="mountainMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BC4A6"/>
      <stop offset="100%" stop-color="#25877C"/>
    </linearGradient>
    <linearGradient id="mountainNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D968A"/>
      <stop offset="100%" stop-color="#1A6B5F"/>
    </linearGradient>
    <linearGradient id="trailGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="280" height="280" fill="url(#skyGradient)"/>
  
  <!-- 太阳 -->
  <circle cx="220" cy="60" r="30" fill="url(#sunGradient)" opacity="0.9"/>
  <circle cx="220" cy="60" r="40" fill="#FFB800" opacity="0.2"/>
  <circle cx="220" cy="60" r="50" fill="#FFB800" opacity="0.1"/>
  
  <!-- 云朵 -->
  <g opacity="0.8">
    <ellipse cx="50" cy="50" rx="25" ry="12" fill="#FFFFFF"/>
    <ellipse cx="65" cy="45" rx="18" ry="10" fill="#FFFFFF"/>
    <ellipse cx="35" cy="48" rx="15" ry="8" fill="#FFFFFF"/>
  </g>
  <g opacity="0.6" transform="translate(120, 20)">
    <ellipse cx="30" cy="40" rx="20" ry="10" fill="#FFFFFF"/>
    <ellipse cx="42" cy="35" rx="14" ry="8" fill="#FFFFFF"/>
  </g>
  
  <!-- 远山 -->
  <path d="M0 180 L60 100 L120 180 Z" fill="url(#mountainFar)" opacity="0.5"/>
  <path d="M80 180 L160 70 L240 180 Z" fill="url(#mountainFar)" opacity="0.6"/>
  <path d="M180 180 L240 110 L280 160 L280 180 Z" fill="url(#mountainFar)" opacity="0.5"/>
  
  <!-- 中景山 -->
  <path d="M-20 200 L80 90 L180 200 Z" fill="url(#mountainMid)" opacity="0.7"/>
  <path d="M120 200 L200 110 L300 200 Z" fill="url(#mountainMid)" opacity="0.8"/>
  
  <!-- 近山 -->
  <path d="M0 280 L0 150 L100 200 L200 140 L280 180 L280 280 Z" fill="url(#mountainNear)"/>
  
  <!-- 路线/小径 -->
  <path d="M40 260 Q80 240 100 220 T160 200 T220 170" 
        stroke="url(#trailGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 路线标记点 -->
  <circle cx="40" cy="260" r="6" fill="#FFB800" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="100" cy="220" r="5" fill="#FFB800" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="160" cy="200" r="5" fill="#FFB800" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="220" cy="170" r="8" fill="#2D968A" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- 树木 -->
  <g transform="translate(20, 200)">
    <ellipse cx="0" cy="20" rx="8" ry="25" fill="#1A6B5F"/>
    <rect x="-2" y="35" width="4" height="15" fill="#145A4F"/>
  </g>
  <g transform="translate(240, 190)">
    <ellipse cx="0" cy="15" rx="10" ry="30" fill="#1A6B5F"/>
    <rect x="-3" y="35" width="6" height="20" fill="#145A4F"/>
  </g>
  <g transform="translate(180, 210)">
    <ellipse cx="0" cy="18" rx="7" ry="22" fill="#1A6B5F"/>
    <rect x="-2" y="32" width="4" height="12" fill="#145A4F"/>
  </g>
  
  <!-- 徒步者剪影 -->
  <g transform="translate(130, 215) scale(0.8)">
    <!-- 身体 -->
    <circle cx="0" cy="-25" r="8" fill="#111827"/>
    <rect x="-6" y="-17" width="12" height="22" rx="4" fill="#111827"/>
    <!-- 背包 -->
    <rect x="-10" y="-15" width="8" height="18" rx="2" fill="#2D968A"/>
    <!-- 腿 -->
    <rect x="-5" y="5" width="4" height="18" rx="2" fill="#111827"/>
    <rect x="1" y="5" width="4" height="18" rx="2" fill="#111827"/>
    <!-- 登山杖 -->
    <line x1="8" y1="-10" x2="12" y2="25" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>