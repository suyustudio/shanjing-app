<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="featureBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFB"/>
      <stop offset="100%" stop-color="#E8F5F3"/>
    </linearGradient>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5F3"/>
      <stop offset="100%" stop-color="#D1F0EA"/>
    </linearGradient>
    <linearGradient id="routeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D968A"/>
      <stop offset="50%" stop-color="#5BC4A6"/>
      <stop offset="100%" stop-color="#2D968A"/>
    </linearGradient>
    <linearGradient id="compassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="280" height="280" fill="url(#featureBg)"/>
  
  <!-- 装饰圆 -->
  <circle cx="40" cy="40" r="20" fill="#2D968A" opacity="0.1"/>
  <circle cx="250" cy="60" r="15" fill="#FFB800" opacity="0.15"/>
  <circle cx="30" cy="240" r="25" fill="#3B9EFF" opacity="0.08"/>
  <circle cx="260" cy="220" r="18" fill="#2D968A" opacity="0.1"/>
  
  <!-- 手机轮廓 -->
  <g transform="translate(140, 140)">
    <!-- 手机外框 -->
    <rect x="-65" y="-110" width="130" height="220" rx="18" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    
    <!-- 屏幕 -->
    <rect x="-58" y="-100" width="116" height="200" rx="12" fill="url(#screenGradient)"/>
    
    <!-- 屏幕顶部状态栏 -->
    <rect x="-58" y="-100" width="116" height="20" rx="12" fill="#2D968A"/>
    <rect x="-58" y="-88" width="116" height="8" fill="#2D968A"/>
    
    <!-- 状态栏内容 -->
    <text x="-50" y="-88" fill="#FFFFFF" font-size="6" font-family="system-ui">9:41</text>
    <text x="40" y="-88" fill="#FFFFFF" font-size="6" font-family="system-ui">100%</text>
    
    <!-- 地图内容 -->
    <!-- 地图网格 -->
    <g opacity="0.2">
      <line x1="-50" y1="-50" x2="50" y2="-50" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="-50" y1="-20" x2="50" y2="-20" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="-50" y1="10" x2="50" y2="10" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="-50" y1="40" x2="50" y2="40" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="-35" y1="-70" x2="-35" y2="70" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="-5" y1="-70" x2="-5" y2="70" stroke="#2D968A" stroke-width="0.5"/>
      <line x1="25" y1="-70" x2="25" y2="70" stroke="#2D968A" stroke-width="0.5"/>
    </g>
    
    <!-- 地图路线 -->
    <path d="M-40 50 Q-25 20 -5 30 T35 -10 T50 -40" 
          stroke="url(#routeGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 路线标记点 -->
    <circle cx="-40" cy="50" r="5" fill="#2D968A" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="-5" cy="30" r="4" fill="#FFB800" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="35" cy="-10" r="4" fill="#FFB800" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="50" cy="-40" r="6" fill="#FF4444" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- 当前位置标记 -->
    <g transform="translate(-5, 30)">
      <circle cx="0" cy="0" r="12" fill="#2D968A" opacity="0.2"/>
      <circle cx="0" cy="0" r="8" fill="#2D968A" opacity="0.4"/>
      <circle cx="0" cy="0" r="4" fill="#2D968A"/>
    </g>
    
    <!-- 目的地标记 -->
    <g transform="translate(50, -40)">
      <path d="M0 -12 C-5 -12 -9 -7 -9 -2 C-9 5 0 14 0 14 C0 14 9 5 9 -2 C9 -7 5 -12 0 -12 Z" 
            fill="#FF4444"/>
      <circle cx="0" cy="-2" r="3" fill="#FFFFFF"/>
    </g>
    
    <!-- 底部导航栏 -->
    <rect x="-58" y="80" width="116" height="20" rx="0" fill="#FFFFFF"/>
    <line x1="-58" y1="80" x2="58" y2="80" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- 导航图标 -->
    <g transform="translate(-35, 90)">
      <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#2D968A"/>
      <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
    </g>
    <g transform="translate(0, 90)" opacity="0.4">
      <circle cx="0" cy="0" r="6" fill="#6B7280"/>
    </g>
    <g transform="translate(35, 90)" opacity="0.4">
      <circle cx="0" cy="0" r="6" fill="#6B7280"/>
    </g>
    
    <!-- Home Indicator -->
    <rect x="-15" y="102" width="30" height="3" rx="1.5" fill="#111827"/>
  </g>
  
  <!-- 导航箭头指示 -->
  <g transform="translate(220, 140)">
    <circle cx="0" cy="0" r="25" fill="#FFFFFF" stroke="#2D968A" stroke-width="2"/>
    <path d="M-8 -8 L0 8 L8 -8" stroke="#2D968A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90)"/>
    <path d="M-8 -8 L0 8 L8 -8" stroke="#2D968A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(10, 0) rotate(-90)"/>
  </g>
  
  <!-- 指南针 -->
  <g transform="translate(60, 140)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#FFB800" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FFB800" stroke-width="1" opacity="0.3"/>
    <path d="M0 -15 L4 0 L0 15 L-4 0 Z" fill="url(#compassGradient)"/>
    <text x="0" y="-10" text-anchor="middle" fill="#FFB800" font-size="6" font-weight="bold">N</text>
  </g>
  
  <!-- 地标图标 -->
  <g transform="translate(140, 50)">
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" stroke="#2D968A" stroke-width="2"/>
    <path d="M-6 -2 L0 -8 L6 -2 L6 6 L-6 6 Z" fill="#2D968A"/>
    <rect x="-2" y="0" width="4" height="4" fill="#FFFFFF"/>
  </g>
  
  <!-- 距离标记 -->
  <g transform="translate(80, 220)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#2D968A"/>
    <text x="0" y="3" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">2.5 km</text>
  </g>
</svg>