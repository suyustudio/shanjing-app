timeouts:
  default: 30
  navigation: 120
  offline_download: 180
  sos: 10
  login: 15
  page_load: 10

mock_services:
  wechat:
    enabled: true
    auto_auth: true
    mock_user:
      openid: "mock_openid_123"
      nickname: "微信测试用户"
      avatar: "https://example.com/wechat_avatar.jpg"
  
  location:
    enabled: true
    mock_provider: true
    default_accuracy: 5.0
  
  network:
    enabled: true
    can_simulate_weak: true
    can_simulate_offline: true
  
  sos:
    enabled: true
    mock_send: true
    auto_success: true

screenshots:
  enabled: true
  on_failure: true
  on_success: false
  directory: "test-results/screenshots"
  max_count: 100

logging:
  level: "info"  # debug, info, warning, error
  save_to_file: true
  directory: "test-results/logs"
  max_file_size_mb: 10

retry:
  enabled: true
  max_attempts: 3
  delay_seconds: 5

reporting:
  format: "markdown"  # markdown, json, html
  include_screenshots: true
  include_logs: true
  output_directory: "test-results/reports"
