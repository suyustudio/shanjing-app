<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 银质金属渐变 -->
    <radialGradient id="silverBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8E8E8" />
      <stop offset="30%" stop-color="#C0C0C0" />
      <stop offset="70%" stop-color="#A0A0A0" />
      <stop offset="100%" stop-color="#808080" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="silverHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 金属纹理 -->
    <linearGradient id="silverTexture" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0C0C0" />
      <stop offset="50%" stop-color="#D3D3D3" />
      <stop offset="100%" stop-color="#C0C0C0" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="silverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#808080" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- 外圈 -->
  <circle cx="64" cy="64" r="58" fill="url(#silverBg)" filter="url(#silverShadow)"/>
  
  <!-- 金属纹理环 -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="url(#silverTexture)" stroke-width="2"/>
  
  
  <!-- 内圈装饰 -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#D3D3D3" stroke-width="1.5"/>
  
  
  <!-- 高光覆盖 -->
  <ellipse cx="64" cy="48" rx="45" ry="35" fill="url(#silverHighlight)"/>
  
  
  <!-- 详细指南针图标 -->
  <g transform="translate(64, 64)">
    <!-- 外圈装饰 -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FFF" stroke-width="1.5" stroke-opacity="0.5"/>
    
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.3"/>
    
    
    <!-- 方向标记 -->
    <g fill="#FFF" opacity="0.7">
      <text x="0" y="-34" text-anchor="middle" font-size="7" font-family="system-ui" font-weight="bold">N</text>
      
      <text x="0" y="40" text-anchor="middle" font-size="6" font-family="system-ui">S</text>
      
      <text x="36" y="3" text-anchor="middle" font-size="6" font-family="system-ui">E</text>
      
      <text x="-36" y="3" text-anchor="middle" font-size="6" font-family="system-ui">W</text>
    </g>
    
    
    <!-- 刻度线 -->
    <g stroke="#FFF" stroke-width="1" stroke-opacity="0.4">
      <line x1="0" y1="-30" x2="0" y2="-26"/>
      
      <line x1="21" y1="-21" x2="18.5" y2="-18.5"/>
      
      <line x1="30" y1="0" x2="26" y2="0"/>
      
      <line x1="21" y1="21" x2="18.5" y2="18.5"/>
      
      <line x1="0" y1="30" x2="0" y2="26"/>
      
      <line x1="-21" y1="21" x2="-18.5" y2="18.5"/>
      
      <line x1="-30" y1="0" x2="-26" y2="0"/>
      
      <line x1="-21" y1="-21" x2="-18.5" y2="-18.5"/>
    </g>
    
    
    <!-- 指南针指针 -->
    <polygon points="0,-24 -7,8 0,4 7,8" fill="#FFF" fill-opacity="0.95"/>
    
    <polygon points="0,24 -7,-8 0,-4 7,-8" fill="#808080" fill-opacity="0.8"/>
    
    
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="5" fill="#FFF"/>
    
    <circle cx="0" cy="0" r="2" fill="#C0C0C0"/>
    
    
    <!-- 地图轮廓装饰 -->
    <path d="M-40,-40 L-35,-35 M40,-40 L35,-35 M-40,40 L-35,35 M40,40 L35,35" 
          stroke="#FFF" stroke-width="0.5" stroke-opacity="0.2"/>
  </g>
  
  
  <!-- 四角星芒装饰 -->
  <g fill="#FFF" opacity="0.4">
    <polygon points="20,20 22,25 27,27 22,29 20,34 18,29 13,27 18,25"/>
    
    <polygon points="108,20 110,25 115,27 110,29 108,34 106,29 101,27 106,25"/>
    
    <polygon points="20,108 22,113 27,115 22,117 20,122 18,117 13,115 18,113"/>
    
    <polygon points="108,108 110,113 115,115 110,117 108,122 106,117 101,115 106,113"/>
  </g>
</svg>
