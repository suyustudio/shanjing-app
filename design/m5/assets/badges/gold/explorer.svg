<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 金质金属渐变 -->
    <radialGradient id="goldBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF4B8" />
      <stop offset="25%" stop-color="#FFD700" />
      <stop offset="60%" stop-color="#DAA520" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
      <stop offset="30%" stop-color="rgba(255,255,255,0.3)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 金色纹理 -->
    <linearGradient id="goldTexture" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFF4B8" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#DAA520" flood-opacity="0.4"/>
    </filter>
    
    <!-- 发光滤镜 -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  
  <!-- 外圈 -->
  <circle cx="64" cy="64" r="58" fill="url(#goldBg)" filter="url(#goldShadow)"/>
  
  
  <!-- 纹理装饰环 -->
  <circle cx="64" cy="64" r="55" fill="none" stroke="url(#goldTexture)" stroke-width="2"/>
  
  
  <!-- 装饰珠环 -->
  <g fill="#FFF4B8">
    <circle cx="64" cy="9" r="2"/>
    
    <circle cx="91" cy="16" r="2"/>
    
    <circle cx="112" cy="37" r="2"/>
    
    <circle cx="119" cy="64" r="2"/>
    
    <circle cx="112" cy="91" r="2"/>
    
    <circle cx="91" cy="112" r="2"/>
    
    <circle cx="64" cy="119" r="2"/>
    
    <circle cx="37" cy="112" r="2"/>
    
    <circle cx="16" cy="91" r="2"/>
    
    <circle cx="9" cy="64" r="2"/>
    
    <circle cx="16" cy="37" r="2"/>
    
    <circle cx="37" cy="16" r="2"/>
  </g>
  
  
  <!-- 内圈 -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#DAA520" stroke-width="1.5"/>
  
  
  <!-- 高光覆盖 -->
  <ellipse cx="64" cy="45" rx="42" ry="32" fill="url(#goldHighlight)"/>
  
  
  <!-- 华丽指南针图标 -->
  <g transform="translate(64, 64)" filter="url(#goldGlow)">
    <!-- 装饰外环 -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#FFF" stroke-width="1" stroke-opacity="0.4"/>
    
    <!-- 主指南针环 -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FFF" stroke-width="2" stroke-opacity="0.7"/>
    
    
    <!-- 内装饰环 -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#FFF" stroke-width="0.5" stroke-opacity="0.3"/>
    
    
    <!-- 方向标记 -->
    <g fill="#FFF">
      <text x="0" y="-38" text-anchor="middle" font-size="8" font-family="system-ui" font-weight="bold">N</text>
      
      <text x="0" y="44" text-anchor="middle" font-size="7" font-family="system-ui">S</text>
      
      <text x="42" y="4" text-anchor="middle" font-size="7" font-family="system-ui">E</text>
      
      <text x="-42" y="4" text-anchor="middle" font-size="7" font-family="system-ui">W</text>
    </g>
    
    
    <!-- 精细刻度 -->
    <g stroke="#FFF" stroke-opacity="0.5">
      <line x1="0" y1="-36" x2="0" y2="-32" stroke-width="1.5"/>
      
      <line x1="25" y1="-25" x2="22" y2="-22" stroke-width="1"/>
      
      <line x1="36" y1="0" x2="32" y2="0" stroke-width="1.5"/>
      
      <line x1="25" y1="25" x2="22" y2="22" stroke-width="1"/>
      
      <line x1="0" y1="36" x2="0" y2="32" stroke-width="1.5"/>
      
      <line x1="-25" y1="25" x2="-22" y2="22" stroke-width="1"/>
      
      <line x1="-36" y1="0" x2="-32" y2="0" stroke-width="1.5"/>
      
      <line x1="-25" y1="-25" x2="-22" y2="-22" stroke-width="1"/>
    </g>
    
    
    <!-- 华丽指针 -->
    <polygon points="0,-28 -8,10 0,6 8,10" fill="#FFF" fill-opacity="0.95"/>
    
    <polygon points="0,28 -8,-10 0,-6 8,-10" fill="#B8860B" fill-opacity="0.9"/>
    
    
    <!-- 指针中心装饰 -->
    <circle cx="0" cy="0" r="6" fill="#FFF"/>
    
    <circle cx="0" cy="0" r="3" fill="#DAA520"/>
    
    
    <!-- 地图轮廓 -->
    <path d="M-45,-45 Q-30,-55 -15,-45 T15,-45 Q30,-55 45,-45" 
          fill="none" stroke="#FFF" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="4,2"/>
  </g>
  
  
  <!-- 四角星芒 -->
  <g fill="#FFF" opacity="0.5">
    <polygon points="16,16 19,23 26,26 19,29 16,36 13,29 6,26 13,23"/>
    
    <polygon points="112,16 115,23 122,26 115,29 112,36 109,29 102,26 109,23"/>
    
    <polygon points="16,112 19,119 26,122 19,125 16,132 13,125 6,122 13,119"/>
    
    <polygon points="112,112 115,119 122,122 115,125 112,132 109,125 102,122 109,119"/>
  </g>
</svg>
