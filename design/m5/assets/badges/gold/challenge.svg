<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="goldBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF4B8" />
      <stop offset="25%" stop-color="#FFD700" />
      <stop offset="60%" stop-color="#DAA520" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#DAA520" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <polygon points="64,8 76,44 116,44 84,68 96,108 64,84 32,108 44,68 12,44 52,44"
           fill="url(#goldBg)" filter="url(#goldShadow)"/>
  
  <polygon points="64,18 73,46 104,46 79,64 88,94 64,76 40,94 49,64 24,46 55,46"
           fill="none" stroke="#B8860B" stroke-width="2"/>
  
  <polygon points="64,18 73,46 104,46 79,64 88,94 64,76 40,94 49,64 24,46 55,46"
           fill="url(#goldHighlight)"/>
  
  
  <g transform="translate(64, 64)">
    <!-- 华丽奖杯 -->
    <path d="M-18,-18 C -18,-28 -12,-32 0,-32 C 12,-32 18,-28 18,-18 C 18,-5 12,8 0,15 C -12,8 -18,-5 -18,-18Z" 
          fill="#FFF" fill-opacity="0.95"/>
    
    
    <!-- 把手 -->
    <path d="M-18,-22 C -26,-22 -26,-12 -18,-10" fill="none" stroke="#FFF" stroke-width="4"/>
    
    <path d="M18,-22 C 26,-22 26,-12 18,-10" fill="none" stroke="#FFF" stroke-width="4"/>
    
    
    <!-- 底座 -->
    <rect x="-10" y="15" width="20" height="6" rx="1" fill="#FFF"/>
    
    <rect x="-12" y="21" width="24" height="5" rx="1" fill="#FFF" fill-opacity="0.8"/>
    
    
    <!-- 橄榄枝花环 -->
    <path d="M-25,-5 Q-30,0 -25,10" fill="none" stroke="#FFF" stroke-width="1.5" stroke-opacity="0.7"/>
    
    <path d="M25,-5 Q30,0 25,10" fill="none" stroke="#FFF" stroke-width="1.5" stroke-opacity="0.7"/>
    
    
    <!-- 装饰叶子 -->
    <ellipse cx="-28" cy="0" rx="3" ry="5" fill="#FFF" fill-opacity="0.5" transform="rotate(-30)"/>
    
    <ellipse cx="28" cy="0" rx="3" ry="5" fill="#FFF" fill-opacity="0.5" transform="rotate(30)"/>
    
    
    <!-- 中央装饰 -->
    <circle cx="0" cy="-5" r="4" fill="#DAA520"/>
  </g>
  
  
  <g fill="#FFF" opacity="0.5">
    <polygon points="16,16 19,23 26,26 19,29 16,36 13,29 6,26 13,23"/>
    
    <polygon points="112,16 115,23 122,26 115,29 112,36 109,29 102,26 109,23"/>
  </g>
</svg>
