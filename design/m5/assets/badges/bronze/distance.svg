<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 铜质金属渐变 -->
    <radialGradient id="bronzeBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8B89A" />
      <stop offset="40%" stop-color="#CD7F32" />
      <stop offset="100%" stop-color="#8B4513" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="bronzeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="bronzeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#8B4513" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 盾牌形状 -->
  <path d="M64 8 
           C 85 8, 104 15, 118 28
           L 118 55
           C 118 85, 95 110, 64 120
           C 33 110, 10 85, 10 55
           L 10 28
           C 24 15, 43 8, 64 8Z" 
        fill="url(#bronzeBg)" filter="url(#bronzeShadow)"/>
  
  <!-- 内边框 -->
  <path d="M64 14
           C 82 14, 98 20, 110 31
           L 110 55
           C 110 81, 90 103, 64 112
           C 38 103, 18 81, 18 55
           L 18 31
           C 30 20, 46 14, 64 14Z"
        fill="none" stroke="#B87333" stroke-width="2"/>
  
  <!-- 高光 -->
  <path d="M64 14
           C 82 14, 98 20, 110 31
           L 110 55
           C 110 55, 108 45, 100 35
           C 90 22, 78 18, 64 18
           C 50 18, 38 22, 28 35
           C 20 45, 18 55, 18 55
           L 18 31
           C 30 20, 46 14, 64 14Z"
        fill="url(#bronzeHighlight)"/>
  
  <!-- 跑道图标 -->
  <g transform="translate(64, 65)">
    <!-- 跑道线 -->
    <ellipse cx="0" cy="0" rx="32" ry="20" fill="none" stroke="#FFF" stroke-width="2" stroke-opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="none" stroke="#FFF" stroke-width="2" stroke-opacity="0.4"/>
    
    <!-- 里程碑 -->
    <rect x="-3" y="-25" width="6" height="18" rx="1" fill="#FFF" fill-opacity="0.9"/>
    <rect x="-5" y="-25" width="10" height="3" rx="1" fill="#FFF" fill-opacity="0.7"/>
    
    <!-- 10km 标记 -->
    <text x="0" y="-15" text-anchor="middle" fill="#8B4513" font-size="5" font-family="system-ui" font-weight="bold">10</text>
  </g>
  
  <!-- 底部装饰 -->
  <g fill="#FFF" opacity="0.2">
    <circle cx="64" cy="100" r="3"/>
    <circle cx="50" cy="95" r="2"/>
    <circle cx="78" cy="95" r="2"/>
  </g>
</svg>
