<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 铜质金属渐变 -->
    <radialGradient id="bronzeBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8B89A" />
      <stop offset="40%" stop-color="#CD7F32" />
      <stop offset="100%" stop-color="#8B4513" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="bronzeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="bronzeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#8B4513" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 圆形 -->
  <circle cx="64" cy="64" r="56" fill="url(#bronzeBg)" filter="url(#bronzeShadow)"/>
  
  <!-- 内圈 -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#B87333" stroke-width="2"/>
  
  
  <!-- 高光覆盖 -->
  <circle cx="64" cy="64" r="54" fill="url(#bronzeHighlight)"/>
  
  <!-- 分享图标 -->
  <g transform="translate(64, 64)">
    <!-- 分享节点 -->
    <circle cx="-15" cy="-15" r="6" fill="#FFF" fill-opacity="0.9"/>
    <circle cx="15" cy="-5" r="6" fill="#FFF" fill-opacity="0.9"/>
    <circle cx="-8" cy="18" r="6" fill="#FFF" fill-opacity="0.9"/>
    
    <!-- 连接线 -->
    <line x1="-10" y1="-11" x2="10" y2="-7" stroke="#FFF" stroke-width="2" stroke-opacity="0.7"/>
    
    <line x1="-12" y1="14" x2="-5" y2="-10" stroke="#FFF" stroke-width="2" stroke-opacity="0.7"/>
  </g>
  
  
  <!-- 装饰性圆点 -->
  <g fill="#FFF" opacity="0.3">
    <circle cx="35" cy="40" r="2"/>
    <circle cx="95" cy="45" r="1.5"/>
    <circle cx="40" cy="90" r="1"/>
    <circle cx="88" cy="88" r="1.5"/>
  </g>
</svg>
