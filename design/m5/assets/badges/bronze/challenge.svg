<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 铜质金属渐变 -->
    <radialGradient id="bronzeBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8B89A" />
      <stop offset="40%" stop-color="#CD7F32" />
      <stop offset="100%" stop-color="#8B4513" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="bronzeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="bronzeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#8B4513" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 星形 -->
  <polygon points="64,8 76,44 116,44 84,68 96,108 64,84 32,108 44,68 12,44 52,44"
           fill="url(#bronzeBg)" filter="url(#bronzeShadow)"/>
  
  
  <!-- 内星形边框 -->
  <polygon points="64,18 73,46 104,46 79,64 88,94 64,76 40,94 49,64 24,46 55,46"
           fill="none" stroke="#B87333" stroke-width="2"/>
  
  
  <!-- 高光 -->
  <polygon points="64,18 73,46 104,46 79,64 88,94 64,76 40,94 49,64 24,46 55,46"
           fill="url(#bronzeHighlight)" clip-path="url(#topHalf)"/>
  
  
  <!-- 奖杯图标 -->
  <g transform="translate(64, 64)">
    <!-- 奖杯杯身 -->
    <path d="M-15,-15 
             C -15,-25 -10,-30 0,-30
             C 10,-30 15,-25 15,-15
             C 15,0 10,10 0,15
             C -10,10 -15,0 -15,-15Z" 
          fill="#FFF" fill-opacity="0.9"/>
    
    
    <!-- 奖杯把手 -->
    <path d="M-15,-20 C -22,-20 -22,-10 -15,-8" fill="none" stroke="#FFF" stroke-width="3" stroke-opacity="0.8"/>
    
    <path d="M15,-20 C 22,-20 22,-10 15,-8" fill="none" stroke="#FFF" stroke-width="3" stroke-opacity="0.8"/>
    
    
    <!-- 奖杯底座 -->
    <rect x="-8" y="15" width="16" height="5" rx="1" fill="#FFF" fill-opacity="0.9"/>
    
    <rect x="-10" y="20" width="20" height="4" rx="1" fill="#FFF" fill-opacity="0.7"/>
    
    
    <!-- 装饰线条 -->
    <line x1="0" y1="-25" x2="0" y2="10" stroke="#8B4513" stroke-width="1" opacity="0.5"/>
  </g>
  
  
  <!-- 星星装饰 -->
  <g fill="#FFF" opacity="0.3">
    <polygon points="64,30 65,33 68,33 66,35 67,38 64,36 61,38 62,35 60,33 63,33"/>
  </g>
</svg>
