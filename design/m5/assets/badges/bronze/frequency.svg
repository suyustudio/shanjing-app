<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 铜质金属渐变 -->
    <radialGradient id="bronzeBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8B89A" />
      <stop offset="40%" stop-color="#CD7F32" />
      <stop offset="100%" stop-color="#8B4513" />
    </radialGradient>
    <!-- 高光渐变 -->
    <linearGradient id="bronzeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="bronzeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#8B4513" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 六边形 -->
  <polygon points="64,8 110,32 110,80 64,104 18,80 18,32" 
           fill="url(#bronzeBg)" filter="url(#bronzeShadow)"/>
  
  <!-- 内六边形边框 -->
  <polygon points="64,16 102,36 102,76 64,96 26,76 26,36"
           fill="none" stroke="#B87333" stroke-width="2"/>
  
  <!-- 高光 -->
  <polygon points="64,16 102,36 102,48 64,28 26,48 26,36"
           fill="url(#bronzeHighlight)"/>
  
  <!-- 日历图标 -->
  <g transform="translate(64, 58)">
    <!-- 日历外框 -->
    <rect x="-24" y="-20" width="48" height="42" rx="3" fill="none" stroke="#FFF" stroke-width="2" stroke-opacity="0.8"/>
    
    <!-- 日历顶部 -->
    <rect x="-24" y="-20" width="48" height="10" rx="3" fill="#FFF" fill-opacity="0.3"/>
    <rect x="-24" y="-14" width="48" height="4" fill="#FFF" fill-opacity="0.5"/>
    
    <!-- 挂钩 -->
    <rect x="-16" y="-26" width="4" height="8" rx="1" fill="#FFF" fill-opacity="0.7"/>
    <rect x="12" y="-26" width="4" height="8" rx="1" fill="#FFF" fill-opacity="0.7"/>
    
    <!-- 日期格子 - 3天标记 -->
    <rect x="-18" y="-2" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.9"/>
    <rect x="-5" y="-2" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.9"/>
    <rect x="8" y="-2" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.9"/>
    
    <!-- 其他格子 -->
    <rect x="-18" y="12" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.2"/>
    <rect x="-5" y="12" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.2"/>
    <rect x="8" y="12" width="10" height="10" rx="1" fill="#FFF" fill-opacity="0.2"/>
  </g>
  
  <!-- 角落装饰 -->
  <g fill="#FFF" opacity="0.25">
    <circle cx="40" cy="28" r="2"/>
    <circle cx="88" cy="28" r="2"/>
    <circle cx="64" cy="92" r="2"/>
  </g>
</svg>
