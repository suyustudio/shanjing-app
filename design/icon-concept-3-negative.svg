<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D968A"/>
      <stop offset="100%" style="stop-color:#1D756B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- 方案3: 负空间设计 - 山字与圆形融合 -->
  <g transform="translate(512, 512)">
    <!-- 外圆轮廓 -->
    <circle cx="0" cy="0" r="300" stroke="white" stroke-width="24" fill="none" opacity="0.3"/>
    
    <!-- 山字 - 负空间设计 -->
    <!-- 左竖 -->
    <rect x="-140" y="-60" width="40" height="200" rx="20" fill="white"/>
    
    <!-- 中竖 - 最高 -->
    <rect x="-20" y="-140" width="40" height="280" rx="20" fill="white"/>
    
    <!-- 右竖 -->
    <rect x="100" y="-60" width="40" height="200" rx="20" fill="white"/>
    
    <!-- 底横 - 弧线 -->
    <path d="M-180 140 Q0 200 180 140" 
          stroke="white" stroke-width="40" stroke-linecap="round" fill="none"/>
  </g>
</svg>
