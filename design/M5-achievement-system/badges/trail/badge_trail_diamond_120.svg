<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120">
  <defs>
    <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#008B8B"/>
      <stop offset="25%" style="stop-color:#00CED1"/>
      <stop offset="50%" style="stop-color:#48D1CC"/>
      <stop offset="75%" style="stop-color:#00CED1"/>
      <stop offset="100%" style="stop-color:#008B8B"/>
    </linearGradient>
    <linearGradient id="diamondFacet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA"/>
      <stop offset="50%" style="stop-color:#48D1CC"/>
      <stop offset="100%" style="stop-color:#008B8B"/>
    </linearGradient>
    <linearGradient id="diamondStream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.8)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="diamondGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00CED1" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <polygon points="40,2 72,22 72,58 40,78 8,58 8,22" fill="none" stroke="#00CED1" stroke-width="2" opacity="0.5" filter="url(#diamondGlow)"/>
  <polygon points="40,4 70,23 70,57 40,76 10,57 10,23" fill="url(#diamondGradient)" stroke="#20B2AA" stroke-width="2"/>
  
  <!-- 切面 -->
  <polygon points="40,4 55,13.5 40,23 25,13.5" fill="url(#diamondFacet1)" opacity="0.8"/>
  <polygon points="70,23 55,13.5 40,23 55,40" fill="url(#diamondFacet1)" opacity="0.6"/>
  <polygon points="70,57 55,40 40,23 40,40" fill="url(#diamondFacet1)" opacity="0.4"/>
  <polygon points="40,76 40,40 40,23 25,40" fill="url(#diamondFacet1)" opacity="0.6"/>
  <polygon points="10,57 25,40 40,23 25,23" fill="url(#diamondFacet1)" opacity="0.5"/>
  <polygon points="10,23 25,13.5 40,23 25,23" fill="url(#diamondFacet1)" opacity="0.7"/>
  
  <!-- 完整地图+山脉+标记 -->
  <g transform="translate(40, 40) scale(0.75)">
    <!-- 地图轮廓 -->
    <rect x="-24" y="-18" width="48" height="36" fill="#006666" opacity="0.3" rx="3"/>
    
    <!-- 山脉 -->
    <path d="M -20,-5 L -10,-20 L 0,-10 L 10,-25 L 20,-5" fill="none" stroke="#006666" stroke-width="2"/>
    
    <!-- 路径 -->
    <path d="M -18,8 L -8,0 L 2,10 L 12,2 L 18,12" fill="none" stroke="#008B8B" stroke-width="1.5" stroke-dasharray="3,2"/>
    
    <!-- 多个标记 -->
    <g fill="#00CED1" stroke="#006666" stroke-width="1">
      <path d="M -15,-18 C -18,-18 -20,-15 -20,-12 C -20,-7 -15,0 -15,0 C -15,0 -10,-7 -10,-12 C -10,-15 -12,-18 -15,-18"/>
      <path d="M 0,-22 C -3,-22 -5,-19 -5,-16 C -5,-11 0,-4 0,-4 C 0,-4 5,-11 5,-16 C 5,-19 3,-22 0,-22"/>
      <path d="M 15,-18 C 12,-18 10,-15 10,-12 C 10,-7 15,0 15,0 C 15,0 20,-7 20,-12 C 20,-15 18,-18 15,-18"/>
    </g>
    
    <!-- 中心大标记 -->
    <path d="M 0,-28 C -4,-28 -7,-24 -7,-20 C -7,-13 0,-2 0,-2 C 0,-2 7,-13 7,-20 C 7,-24 4,-28 0,-28" fill="#E0FFFF" stroke="#006666" stroke-width="1.5"/>
    <circle cx="0" cy="-20" r="3" fill="#006666"/>
  </g>
  
  <!-- 50 -->
  <text x="40" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#E0FFFF">50</text>
  
  <polygon points="40,4 55,13.5 40,23 25,13.5" fill="url(#diamondStream)" opacity="0.3"/>
  
  <g fill="#E0FFFF">
    <circle cx="25" cy="15" r="2"/>
    <circle cx="55" cy="25" r="1.5"/>
    <circle cx="40" cy="65" r="1"/>
    <polygon points="60,15 62,18 65,18 62.5,20 63.5,23 60,21 56.5,23 57.5,20 55,18 58,18"/>
  </g>
</svg>