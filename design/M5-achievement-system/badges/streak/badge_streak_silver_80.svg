<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8A8A8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="60%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <linearGradient id="silverFlame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#606060"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
    <filter id="silverGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="40" cy="40" r="38" fill="none" stroke="#C0C0C0" stroke-width="1" opacity="0.3" filter="url(#silverGlow)"/>
  <circle cx="40" cy="40" r="36" fill="url(#silverGradient)" stroke="#808080" stroke-width="2"/>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#808080" stroke-width="1"/>
  <circle cx="40" cy="40" r="28" fill="none" stroke="#A0A0A0" stroke-width="0.5"/>
  
  <!-- 中火焰 -->
  <g transform="translate(40, 40)">
    <!-- 主火焰 -->
    <path d="M 0,12 C -10,6 -12,-6 -6,-14 C -4,-18 -2,-22 0,-26 C 2,-22 4,-18 6,-14 C 12,-6 10,6 0,12" fill="url(#silverFlame)"/>
    
    <!-- 内焰1 -->
    <path d="M 0,8 C -6,3 -7,-4 -4,-9 C -2,-12 0,-16 0,-20 C 0,-16 2,-12 4,-9 C 7,-4 6,3 0,8" fill="#C0C0C0" opacity="0.6"/>
    
    <!-- 内焰2 -->
    <path d="M 0,4 C -3,0 -4,-3 -2,-6 C 0,-9 0,-12 0,-12 C 0,-12 0,-9 2,-6 C 4,-3 3,0 0,4" fill="#E8E8E8" opacity="0.7"/>
    
    <!-- 核心 -->
    <path d="M 0,2 C -1,0 -2,-2 -1,-4 C 0,-6 0,-8 0,-8 C 0,-8 0,-6 1,-4 C 2,-2 1,0 0,2" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- 7天 -->
  <text x="40" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#404040">7天</text>
  
  <ellipse cx="28" cy="22" rx="10" ry="6" fill="rgba(255,255,255,0.5)" transform="rotate(-30, 28, 22)"/>
</svg>