<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="50%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#2D3436"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#mainGrad)"/>
  
  <!-- 山形 -->
  <g transform="translate(512, 580)" fill="#FFFFFF">
    <polygon points="-280,120 -120,-180 0,20" opacity="0.95"/>
    <polygon points="0,20 120,-140 280,120" opacity="0.85"/>
    <polygon points="-80,120 0,-220 80,120" opacity="1"/>
  </g>
  
  <!-- 路径 -->
  <g transform="translate(512, 580)" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round">
    <path d="M-60,200 Q-40,100 0,0 Q40,-80 80,-100"/>
    <path d="M-60,200 Q-40,100 0,0 Q40,-80 80,-100" stroke="#F39C12" stroke-width="8" opacity="0.6"/>
  </g>
  
  <!-- 终点 -->
  <circle cx="592" cy="480" r="16" fill="#F39C12"/>
  <circle cx="592" cy="480" r="8" fill="#FFFFFF"/>
</svg>