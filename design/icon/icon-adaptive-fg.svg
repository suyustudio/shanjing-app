<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <!-- 路径金色渐变 -->
    <linearGradient id="pathGradSmall" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="50%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    
    <!-- 手绘笔触效果 -->
    <filter id="brushSmall">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8"/>
    </filter>
  </defs>
  
  <!-- 远山背景 - 简化 -->
  <g opacity="0.5">
    <!-- 左侧山 -->
    <path d="M10,90 Q25,60 35,55 Q42,52 45,60 Q48,68 50,90 Z" fill="#C9B8A0"/>
    
    <!-- 右侧山 -->
    <path d="M58,90 Q62,65 72,60 Q82,55 90,65 Q95,72 98,90 Z" fill="#B8A890"/>
    
    <!-- 中央主峰 -->
    <path d="M25,95 Q40,40 54,32 Q68,40 83,95 Z" fill="#A89880"/>
  </g>
  
  <!-- 手绘路径 - 主体 -->
  <g filter="url(#brushSmall)">
    <!-- 路径底色 -->
    <path d="M22,98
             C26,88 24,82 28,76
             C32,70 30,64 34,58
             C38,52 36,46 40,40
             C44,34 42,28 54,32"
          fill="none"
          stroke="#8B7355"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.3"/>
    
    <!-- 主路径 -->
    <path d="M22,98
             C26,88 24,82 28,76
             C32,70 30,64 34,58
             C38,52 36,46 40,40
             C44,34 42,28 54,32"
          fill="none"
          stroke="url(#pathGradSmall)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- 路径高光 -->
    <path d="M22,97
             C26,87 24,81 28,75
             C32,69 30,63 34,57
             C38,51 36,45 40,39
             C44,33 42,27 54,31"
          fill="none"
          stroke="#FFF8DC"
          stroke-width="0.6"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.6"/>
  </g>
  
  <!-- 山顶小旗帜 -->
  <g transform="translate(54, 32)">
    <line x1="0" y1="0" x2="0" y2="-6" stroke="#8B4513" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M0.5,-5.5 L5,-3.5 L0.5,-1.5 Z" fill="#E74C3C"/>
    <circle cx="0" cy="0" r="4" fill="#F39C12" opacity="0.2"/>
  </g>
  
  <!-- 起点标记 -->
  <g transform="translate(22, 98)">
    <circle cx="0" cy="0" r="3" fill="#27AE60"/>
    <circle cx="0" cy="0" r="1.5" fill="#FFF"/>
  </g>
  
</svg>