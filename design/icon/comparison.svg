<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 32px; font-weight: 600; fill: #2D3436; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; fill: #636E72; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #B2BEC3; }
      .vs { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 48px; font-weight: 700; fill: #DFE6E9; }
      .arrow { fill: none; stroke: #F39C12; stroke-width: 3; stroke-linecap: round; }
    </style>
    
    <!-- 飞书蓝 -->
    <linearGradient id="feishuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3370FF"/>
      <stop offset="100%" style="stop-color:#00D6B9"/>
    </linearGradient>
    
    <!-- 山径渐变 -->
    <linearGradient id="shanjingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12"/>
      <stop offset="50%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#2D3436"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#FAFAFA"/>
  
  <!-- 标题 -->
  <text x="600" y="60" text-anchor="middle" class="title" style="font-size: 42px;">山径 APP 新图标设计</text>
  <text x="600" y="95" text-anchor="middle" class="subtitle">与飞书图标的对比</text>
  
  <!-- 左侧：飞书图标 -->
  <g transform="translate(250, 250)">
    <!-- 飞书图标背景 -->
    <rect x="-100" y="-100" width="200" height="200" rx="48" fill="url(#feishuGrad)"/>
    
    <!-- 飞书气泡符号 -->
    <path d="M-50,-20 Q-50,-50 -20,-50 L20,-50 Q50,-50 50,-20 L50,20 Q50,50 20,50 L-10,50 L-30,70 L-20,50 Q-50,50 -50,20 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 飞书内部线条 -->
    <path d="M-25,-10 L25,-10" stroke="#3370FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M-25,10 L15,10" stroke="#3370FF" stroke-width="8" stroke-linecap="round"/>
    
    <!-- 标签 -->
    <text x="0" y="150" text-anchor="middle" class="title" style="fill: #3370FF;">飞书</text>
    <text x="0" y="180" text-anchor="middle" class="subtitle">圆润气泡 · 蓝绿渐变</text>
    <text x="0" y="205" text-anchor="middle" class="label">办公协作 · 科技感</text>
  </g>
  
  <!-- 中间：VS -->
  <text x="600" y="280" text-anchor="middle" class="vs">VS</text>
  
  <!-- 右侧：山径新图标 -->
  <g transform="translate(950, 250)">
    <!-- 山径图标背景 -->
    <rect x="-100" y="-100" width="200" height="200" rx="36" fill="url(#shanjingGrad)"/>
    
    <!-- 山形 -->
    <g fill="#FFFFFF">
      <polygon points="-55,45 -25,-35 0,5" opacity="0.95"/>
      <polygon points="0,5 25,-30 55,45" opacity="0.85"/>
      <polygon points="-18,45 0,-50 18,45" opacity="1"/>
    </g>
    
    <!-- 路径 -->
    <g fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round">
      <path d="M-12,70 Q-8,35 0,5 Q8,-25 18,-30"/>
      <path d="M-12,70 Q-8,35 0,5 Q8,-25 18,-30" stroke="#F39C12" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- 终点标记 -->
    <circle cx="18" cy="-30" r="3.5" fill="#F39C12"/>
    
    <!-- 标签 -->
    <text x="0" y="150" text-anchor="middle" class="title" style="fill: #F39C12;">山径</text>
    <text x="0" y="180" text-anchor="middle" class="subtitle">锐利几何 · 金橙渐变</text>
    <text x="0" y="205" text-anchor="middle" class="label">户外探索 · 自然感</text>
  </g>
  
  <!-- 底部：设计要点 -->
  <g transform="translate(100, 550)">
    <rect width="1000" height="200" rx="16" fill="white" stroke="#E8E8E8" stroke-width="2"/>
    
    <text x="500" y="45" text-anchor="middle" class="title" style="font-size: 24px;">设计要点</text>
    
    <!-- 要点列表 -->
    <g transform="translate(60, 80)">
      <circle cx="8" cy="8" r="4" fill="#F39C12"/>
      <text x="25" y="14" class="subtitle">区别于飞书：金橙大地色系 vs 蓝绿科技色</text>
      
      <circle cx="8" cy="45" r="4" fill="#F39C12"/>
      <text x="25" y="51" class="subtitle">品牌调性：锐利山峰 + 路径动势，传达探索精神</text>
      
      
      <circle cx="8" cy="82" r="4" fill="#F39C12"/>
      <text x="25" y="88" class="subtitle">简洁识别：小尺寸下山形+路径依然清晰可辨</text>
    </g>
  </g>
</svg>