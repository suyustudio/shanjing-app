<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1024" height="1024" fill="#2D968A"/>
  
  <!-- 方案4: 山水意境风 - 山字+水波纹 -->
  <g transform="translate(512, 480)">
    <!-- 山字主体 - 书法感 -->
    <!-- 竖 - 左 -->
    <path d="M-100 80 Q-95 20 -90 -40 Q-85 -80 -80 -110" 
          stroke="white" stroke-width="36" stroke-linecap="round" fill="none"/>
    
    <!-- 竖 - 中 -->
    <path d="M0 100 Q2 30 4 -50 Q6 -120 8 -170" 
          stroke="white" stroke-width="44" stroke-linecap="round" fill="none"/>
    
    <!-- 竖 - 右 -->
    <path d="M100 80 Q95 20 90 -40 Q85 -80 80 -110" 
          stroke="white" stroke-width="36" stroke-linecap="round" fill="none"/>
    
    <!-- 横 - 底部 -->
    <path d="M-140 80 Q0 130 140 80" 
          stroke="white" stroke-width="32" stroke-linecap="round" fill="none"/>
    
    <!-- 水波纹装饰 - 山脚下的水 -->
    <path d="M-180 160 Q-120 180 -60 160 Q0 140 60 160 Q120 180 180 160" 
          stroke="white" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.5"/>
    
    <path d="M-160 200 Q-100 220 -40 200 Q20 180 80 200 Q140 220 160 200" 
          stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.3"/>
  </g>
</svg>
