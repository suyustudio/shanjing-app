<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景路径 -->
  <path d="M30 160 Q60 140 80 150 T120 145 T170 155" stroke="#E5E7EB" stroke-width="3" fill="none" stroke-dasharray="8,6"/>
  
  <!-- 空背包 -->
  <g transform="translate(100, 95)">
    <!-- 背包主体 -->
    <rect x="-30" y="-20" width="60" height="55" rx="12" fill="#2D968A"/>
    <!-- 背包顶部翻盖 -->
    <path d="M-30 -20 Q0 -35 30 -20 L30 -5 Q0 -20 -30 -5 Z" fill="#238B7F"/>
    <!-- 背包口袋 -->
    <rect x="-20" y="5" width="40" height="20" rx="6" fill="#1F7A70"/>
    <!-- 背带 -->
    <path d="M-25 -15 Q-40 -5 -35 25" stroke="#1F7A70" stroke-width="4" fill="none"/>
    <path d="M25 -15 Q40 -5 35 25" stroke="#1F7A70" stroke-width="4" fill="none"/>
    <!-- 扣环 -->
    <circle cx="-15" cy="-8" r="3" fill="#FFC107"/>
    <circle cx="15" cy="-8" r="3" fill="#FFC107"/>
  </g>
  
  <!-- 脚印装饰 -->
  <g transform="translate(50, 140) rotate(-20)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#9DD6CE"/>
    <circle cx="-3" cy="-8" r="2" fill="#9DD6CE"/>
    <circle cx="3" cy="-8" r="2" fill="#9DD6CE"/>
    <circle cx="0" cy="-12" r="2" fill="#9DD6CE"/>
  </g>
  <g transform="translate(75, 155) rotate(10)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="7" ry="10" fill="#72C0B5"/>
  </g>
  
  <!-- 远处山峰 -->
  <path d="M120 60 L140 30 L160 60" stroke="#E5E7EB" stroke-width="2" fill="none"/>
  <path d="M140 30 L140 25" stroke="#E5E7EB" stroke-width="2"/>
</svg>